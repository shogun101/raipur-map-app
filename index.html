<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#ffffff;--bg:rgba(5,5,9,0.97);--border:rgba(255,255,255,0.06);--muted:rgba(255,255,255,0.28);--r:5px}
body{background:#0d0d0d;font-family:'Syne',sans-serif;color:#f0f0f8;height:100vh;overflow:hidden}
#map{position:absolute;inset:0}
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib{display:none!important}

.topbar{position:absolute;top:0;left:300px;right:0;z-index:20;pointer-events:none;padding:20px 24px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%)}
.brand{font-weight:800;font-size:19px;letter-spacing:-.5px;color:#fff}
.brand em{font-style:normal;transition:color .4s}
.brand-sub{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:2px}

.stats{position:absolute;top:18px;right:22px;z-index:20;display:flex;gap:6px}
.sc{background:rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(20px);padding:10px 14px;text-align:center;border-top:2px solid transparent;opacity:0;transform:translateY(-5px);transition:opacity .4s,transform .4s}
.sc.show{opacity:1;transform:translateY(0)}
.sc-n{font-weight:800;font-size:22px;letter-spacing:-1px;line-height:1}
.sc-l{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1.5px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:3px}

/* PANEL */
.panel{position:absolute;top:0;bottom:0;left:0;width:298px;z-index:20;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;opacity:0;transform:translateX(-10px);transition:opacity .5s .15s,transform .5s .15s}
.panel.show{opacity:1;transform:translateX(0)}
.ph{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.ph-title{font-weight:800;font-size:15px}
.ph-sub{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.ps{padding:12px 18px;border-bottom:1px solid var(--border)}
.ps-label{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* THEME TABS */
.theme-tabs{display:flex;gap:4px}
.ttab{flex:1;padding:7px 4px;text-align:center;cursor:pointer;border-radius:var(--r);border:1.5px solid var(--border);transition:all .18s;position:relative;overflow:hidden}
.ttab-swatch{width:100%;height:20px;border-radius:3px;margin-bottom:4px}
.ttab-name{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);text-transform:uppercase;transition:color .18s}
.ttab.active{border-color:rgba(255,255,255,.55)}
.ttab.active .ttab-name{color:#fff}
.ttab:hover:not(.active){border-color:rgba(255,255,255,.2)}

/* ZONE LIST */
.zone-scroll{flex:1;overflow-y:auto}
.zone-scroll::-webkit-scrollbar{width:2px}
.zone-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07)}
.zi{padding:10px 18px;border-bottom:1px solid var(--border)}
.zi-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.zi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s}
.zi-name{font-size:11.5px;font-weight:600;flex:1}
.zi-pct{font-family:'Space Mono',monospace;font-size:10px;min-width:30px;text-align:right;transition:color .3s}
/* Dialkit slider */
.dk{position:relative;height:20px;display:flex;align-items:center}
.dk-track{position:absolute;left:0;right:0;height:3px;background:rgba(255,255,255,.07);border-radius:2px}
.dk-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;transition:background .3s}
input[type=range]{position:absolute;width:100%;height:100%;opacity:0;cursor:pointer;-webkit-appearance:none;margin:0}
.dk-thumb{position:absolute;width:13px;height:13px;border-radius:50%;pointer-events:none;transform:translateX(-50%);transition:left .04s,background .3s,box-shadow .3s}

/* FOOTER */
.pf{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.pf-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:9px 6px;cursor:pointer;border-radius:var(--r);transition:all .18s}
.pf-btn:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.15)}
.pf-btn.on{border-color:var(--c)!important;color:var(--c)!important;background:rgba(255,255,255,.04)!important}

.city-wm{position:absolute;bottom:22px;right:22px;z-index:10;text-align:right;pointer-events:none}
.city-wm big{font-weight:800;font-size:88px;letter-spacing:-7px;color:rgba(255,255,255,.02);line-height:1;display:block}
.city-wm small{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:3px;color:rgba(255,255,255,.08);text-transform:uppercase}

.toast{position:absolute;bottom:68px;right:22px;z-index:30;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 13px;border-radius:var(--r);opacity:0;transition:opacity .3s;pointer-events:none;color:#fff;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2)}
.toast.show{opacity:1}

#loader{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px;transition:opacity .7s}
#loader.hidden{opacity:0;pointer-events:none}
.ll{font-weight:800;font-size:30px;letter-spacing:-1px;color:#fff}
.lb{width:110px;height:2px;background:rgba(255,255,255,.07);overflow:hidden}
.lb::after{content:'';display:block;height:100%;background:#fff;animation:ld 1.2s ease-in-out infinite}
@keyframes ld{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.ls{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.22);text-transform:uppercase}
</style>
</head>
<body>
<div id="loader"><div class="ll">Raipur</div><div class="lb"></div><div class="ls">Loading coverage...</div></div>
<div id="map"></div>

<div class="topbar">
  <div class="brand">Delivery<em id="ba" style="color:#fff">OS</em></div>
  <div class="brand-sub">Raipur · Market Coverage</div>
</div>

<div class="stats">
  <div class="sc" id="sc1"><div class="sc-n" id="sn1">0</div><div class="sc-l">Active</div></div>
  <div class="sc" id="sc2"><div class="sc-n" style="color:#fff">15</div><div class="sc-l">Zones</div></div>
  <div class="sc" id="sc3" style="border-top-color:rgba(255,255,255,.12)"><div class="sc-n" style="color:#fff">1.2M</div><div class="sc-l">Pop.</div></div>
</div>

<div class="panel" id="panel">
  <div class="ph"><div class="ph-title">Coverage Map</div><div class="ph-sub">Raipur · 15 zones</div></div>

  <div class="ps">
    <div class="ps-label">Theme</div>
    <div class="theme-tabs" id="theme-tabs"></div>
  </div>

  <div class="zone-scroll" id="zone-list"></div>

  <div class="pf">
    <button class="pf-btn on" id="fx-btn" onclick="toggleFX()">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      Effects
    </button>
    <button class="pf-btn" onclick="downloadPNG()">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PNG
    </button>
  </div>
</div>

<div class="city-wm"><big>RPR</big><small>Chhattisgarh</small></div>
<div class="toast" id="toast">✓ Saved</div>

<script>
const urlToken=new URLSearchParams(window.location.search).get('t');
if(urlToken) localStorage.setItem('mbtoken',urlToken);
const TOKEN=localStorage.getItem('mbtoken')||'';

/* ── THEMES ─────────────────────────────────────────────────────── */
// Each theme: fill color + opacity + border color over dark base map
const THEMES=[
  {id:'mono',  name:'Mono',  fill:'#ffffff', border:'#ffffff', fillOp:0, borderOp:0.75, grad:'linear-gradient(160deg,#333,#888,#ddd)'},
  {id:'warm',  name:'Warm',  fill:'#ffd54f', border:'#ffd54f', fillOp:0, borderOp:0.85, grad:'linear-gradient(160deg,#b8860b,#ffd54f,#ffe082)'},
  {id:'neon',  name:'Neon',  fill:'#00e676', border:'#00e676', fillOp:0, borderOp:0.85, grad:'linear-gradient(160deg,#005724,#00e676,#69ff47)'},
  {id:'ice',   name:'Ice',   fill:'#40c4ff', border:'#40c4ff', fillOp:0, borderOp:0.85, grad:'linear-gradient(160deg,#004d73,#40c4ff,#80d8ff)'},
  {id:'ember', name:'Ember', fill:'#ff5252', border:'#ff5252', fillOp:0, borderOp:0.85, grad:'linear-gradient(160deg,#7f0000,#ff5252,#ff8a65)'},
];
let theme=THEMES[0];
let fxOn=true;

/* ── ZONES with coverage slider (0–100) ────────────────────────── */
const zones=[
  {id:'old-raipur',    name:'Old Raipur',      cov:85, poly:[[81.616,21.226],[81.640,21.226],[81.640,21.244],[81.616,21.244]]},
  {id:'purani-basti',  name:'Purani Basti',    cov:80, poly:[[81.629,21.234],[81.646,21.234],[81.646,21.248],[81.629,21.248]]},
  {id:'tatibandh',     name:'Tatibandh',       cov:75, poly:[[81.597,21.226],[81.618,21.226],[81.618,21.244],[81.597,21.244]]},
  {id:'telibandha',    name:'Telibandha',      cov:90, poly:[[81.604,21.238],[81.626,21.238],[81.626,21.256],[81.604,21.256]]},
  {id:'civil-lines',   name:'Civil Lines',     cov:70, poly:[[81.609,21.248],[81.632,21.248],[81.632,21.267],[81.609,21.267]]},
  {id:'pandri',        name:'Pandri',          cov:78, poly:[[81.648,21.229],[81.669,21.229],[81.669,21.247],[81.648,21.247]]},
  {id:'shankar-nagar', name:'Shankar Nagar',   cov:0,  poly:[[81.652,21.248],[81.674,21.248],[81.674,21.265],[81.652,21.265]]},
  {id:'avanti-vihar',  name:'Avanti Vihar',    cov:0,  poly:[[81.641,21.252],[81.659,21.252],[81.659,21.268],[81.641,21.268]]},
  {id:'devendra-nagar',name:'Devendra Nagar',  cov:0,  poly:[[81.596,21.248],[81.614,21.248],[81.614,21.266],[81.596,21.266]]},
  {id:'fafadih',       name:'Fafadih',         cov:0,  poly:[[81.635,21.258],[81.656,21.258],[81.656,21.275],[81.635,21.275]]},
  {id:'mowa',          name:'Mowa',            cov:0,  poly:[[81.620,21.268],[81.646,21.268],[81.646,21.286],[81.620,21.286]]},
  {id:'tikrapara',     name:'Tikrapara',       cov:0,  poly:[[81.637,21.216],[81.657,21.216],[81.657,21.231],[81.637,21.231]]},
  {id:'pachpedi',      name:'Pachpedi Naka',   cov:0,  poly:[[81.614,21.216],[81.634,21.216],[81.634,21.231],[81.614,21.231]]},
  {id:'khamtarai',     name:'Khamtarai',       cov:0,  poly:[[81.657,21.239],[81.679,21.239],[81.679,21.257],[81.657,21.257]]},
  {id:'gudhiyari',     name:'Gudhiyari',       cov:0,  poly:[[81.558,21.237],[81.580,21.237],[81.580,21.254],[81.558,21.254]]},
];

/* ── MAP — dark base ─────────────────────────────────────────────── */
mapboxgl.accessToken=TOKEN;
const map=new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/dark-v11',
  center:[81.635,21.250], zoom:11.2, pitch:0, bearing:0,
  antialias:true, preserveDrawingBuffer:true
});

map.on('load',()=>{
  // Add fill + border layers for each zone
  zones.forEach(z=>{
    const geom={type:'Polygon',coordinates:[[...z.poly,z.poly[0]]]};
    const feat={type:'Feature',geometry:geom,properties:{}};
    map.addSource(`s-${z.id}`,{type:'geojson',data:feat});

    // FILL — brightens the zone area
    map.addLayer({
      id:`fill-${z.id}`, type:'fill', source:`s-${z.id}`,
      layout:{visibility: (fxOn&&z.cov>0)?'visible':'none'},
      paint:{
        'fill-color': theme.fill,
        'fill-opacity': (z.cov/100) * theme.fillOp
      }
    });

    // BORDER — clean crisp edge
    map.addLayer({
      id:`line-${z.id}`, type:'line', source:`s-${z.id}`,
      layout:{visibility: (fxOn&&z.cov>0)?'visible':'none'},
      paint:{
        'line-color': theme.border,
        'line-opacity': (z.cov/100) * theme.borderOp,
        'line-width': ['interpolate',['linear'],['zoom'], 10,1, 13,1.5, 16,2],
      }
    });
  });

  buildUI();
  updateStats();

  setTimeout(()=>{
    document.getElementById('loader').classList.add('hidden');
    ['sc1','sc2','sc3'].forEach((id,i)=>setTimeout(()=>document.getElementById(id).classList.add('show'),i*80));
    document.getElementById('panel').classList.add('show');
    applyTheme(theme);
    setTimeout(()=>{
      map.flyTo({center:[81.630,21.248],zoom:12.8,pitch:0,bearing:0,duration:3000,easing:t=>t<.5?2*t*t:-1+(4-2*t)*t});
    },1400);
  },600);
});

/* ── THEME ──────────────────────────────────────────────────────── */
function applyTheme(t){
  theme=t;
  document.documentElement.style.setProperty('--c',t.border);
  document.getElementById('ba').style.color=t.border;
  document.getElementById('sc1').style.borderTopColor=t.border;
  document.getElementById('sn1').style.color=t.border;
  document.getElementById('sc2').style.borderTopColor=t.border+'55';
  const fxBtn=document.getElementById('fx-btn');
  fxBtn.style.borderColor=fxOn?t.border:'var(--border)';
  fxBtn.style.color=fxOn?t.border:'var(--muted)';
  document.querySelectorAll('.ttab').forEach(el=>el.classList.toggle('active',el.dataset.id===t.id));
  zones.forEach(z=>{
    if(map.getLayer(`fill-${z.id}`)){
      map.setPaintProperty(`fill-${z.id}`,'fill-color',t.fill);
      map.setPaintProperty(`fill-${z.id}`,'fill-opacity',(z.cov/100)*t.fillOp);
    }
    if(map.getLayer(`line-${z.id}`)){
      map.setPaintProperty(`line-${z.id}`,'line-color',t.border);
      map.setPaintProperty(`line-${z.id}`,'line-opacity',(z.cov/100)*t.borderOp);
    }
    syncZoneDot(z);
    syncSlider(z.id);
  });
}

/* ── UI ─────────────────────────────────────────────────────────── */
function buildUI(){
  const tr=document.getElementById('theme-tabs');
  THEMES.forEach(t=>{
    const el=document.createElement('div');
    el.className='ttab'+(t.id===theme.id?' active':'');
    el.dataset.id=t.id;
    el.innerHTML=`<div class="ttab-swatch" style="background:${t.grad}"></div><div class="ttab-name">${t.name}</div>`;
    el.onclick=()=>applyTheme(t);
    tr.appendChild(el);
  });

  const list=document.getElementById('zone-list');
  zones.forEach(z=>{
    const el=document.createElement('div');
    el.className='zi';
    el.innerHTML=`
      <div class="zi-top">
        <div class="zi-dot" id="dot-${z.id}"></div>
        <div class="zi-name">${z.name}</div>
        <div class="zi-pct" id="pct-${z.id}">${z.cov}%</div>
      </div>
      <div class="dk">
        <div class="dk-track"><div class="dk-fill" id="fill2-${z.id}"></div></div>
        <input type="range" min="0" max="100" step="1" value="${z.cov}" id="sl-${z.id}"
          oninput="onSlider('${z.id}',+this.value)">
        <div class="dk-thumb" id="thumb-${z.id}"></div>
      </div>`;
    list.appendChild(el);
    syncZoneDot(z);
    syncSlider(z.id);
  });
}

function syncZoneDot(z){
  const dot=document.getElementById(`dot-${z.id}`);
  if(!dot) return;
  if(z.cov>0){ dot.style.background=theme.border; dot.style.boxShadow=`0 0 5px ${theme.border}`; }
  else { dot.style.background='rgba(255,255,255,.1)'; dot.style.boxShadow='none'; }
}

function syncSlider(zid){
  const sl=document.getElementById(`sl-${zid}`);
  if(!sl) return;
  const z=zones.find(z=>z.id===zid);
  const pct=((sl.value-sl.min)/(sl.max-sl.min))*100;
  const fill=document.getElementById(`fill2-${zid}`);
  const thumb=document.getElementById(`thumb-${zid}`);
  const pctEl=document.getElementById(`pct-${zid}`);
  const active=z.cov>0;
  if(fill){ fill.style.width=pct+'%'; fill.style.background=active?theme.border:'rgba(255,255,255,.1)'; }
  if(thumb){ thumb.style.left=pct+'%'; thumb.style.background=active?theme.border:'rgba(255,255,255,.2)'; thumb.style.boxShadow=active?`0 0 6px ${theme.border}80`:'none'; }
  if(pctEl){ pctEl.style.color=active?theme.border:'var(--muted)'; }
}

function onSlider(zid, val){
  const z=zones.find(z=>z.id===zid);
  z.cov=val;
  document.getElementById(`pct-${zid}`).textContent=val+'%';
  const vis=(fxOn&&val>0)?'visible':'none';
  if(map.getLayer(`fill-${zid}`)){
    map.setLayoutProperty(`fill-${zid}`,'visibility',vis);
    map.setPaintProperty(`fill-${zid}`,'fill-opacity',(val/100)*theme.fillOp);
  }
  if(map.getLayer(`line-${zid}`)){
    map.setLayoutProperty(`line-${zid}`,'visibility',vis);
    map.setPaintProperty(`line-${zid}`,'line-opacity',(val/100)*theme.borderOp);
  }
  syncZoneDot(z);
  syncSlider(zid);
  updateStats();
}

function updateStats(){
  document.getElementById('sn1').textContent=zones.filter(z=>z.cov>0).length;
}

function toggleFX(){
  fxOn=!fxOn;
  zones.forEach(z=>{
    const vis=(fxOn&&z.cov>0)?'visible':'none';
    if(map.getLayer(`fill-${z.id}`)) map.setLayoutProperty(`fill-${z.id}`,'visibility',vis);
    if(map.getLayer(`line-${z.id}`)) map.setLayoutProperty(`line-${z.id}`,'visibility',vis);
  });
  const btn=document.getElementById('fx-btn');
  btn.classList.toggle('on',fxOn);
  btn.style.borderColor=fxOn?theme.border:'var(--border)';
  btn.style.color=fxOn?theme.border:'var(--muted)';
}

function downloadPNG(){
  map.once('render',()=>{
    const a=document.createElement('a');
    a.href=map.getCanvas().toDataURL('image/png');
    a.download=`raipur-${theme.id}-${Date.now()}.png`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);
  });
  map.triggerRepaint();
}
</script>
</body>
</html>
