<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060810; font-family:'Syne',sans-serif; color:#f0f4f8; height:100vh; overflow:hidden; }
#map { position:absolute; inset:0; }
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib { display:none !important; }

.topbar {
  position:absolute; top:0; left:0; right:0; z-index:20; pointer-events:none;
  padding:20px 28px;
  background:linear-gradient(180deg,rgba(6,8,16,0.92) 0%,transparent 100%);
}
.brand-name { font-weight:800; font-size:22px; letter-spacing:-0.5px; color:#fff; }
.brand-name span { color:#00e676; }
.brand-tag { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-top:3px; }

.stats-row { position:absolute; top:18px; right:28px; z-index:20; display:flex; gap:8px; }
.stat-card {
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); padding:12px 18px; text-align:center; border-top:2px solid;
  opacity:0; transform:translateY(-8px); transition:opacity 0.5s, transform 0.5s;
}
.stat-card.visible { opacity:1; transform:translateY(0); }
.stat-num { font-weight:800; font-size:26px; line-height:1; letter-spacing:-1px; }
.stat-desc { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1.5px; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-top:4px; }

.action-btns {
  position:absolute; top:110px; right:28px; z-index:20;
  display:flex; flex-direction:column; gap:6px;
  opacity:0; transition:opacity 0.5s 0.4s;
}
.action-btns.visible { opacity:1; }
.act-btn {
  display:flex; align-items:center; gap:8px;
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px); color:rgba(255,255,255,0.55);
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1.5px;
  padding:9px 14px; text-transform:uppercase; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.act-btn:hover { border-color:rgba(255,255,255,0.2); color:#fff; }
.act-btn.on { border-color:#00e676; color:#00e676; background:rgba(0,230,118,0.06); }

.legend {
  position:absolute; bottom:32px; left:28px; z-index:20;
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); padding:16px 20px; min-width:210px;
  opacity:0; transition:opacity 0.5s 0.3s;
}
.legend.visible { opacity:1; }
.legend-title { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:12px; }
.legend-item {
  display:flex; align-items:center; gap:10px; margin-bottom:8px; cursor:pointer;
  transition:opacity 0.2s; padding:5px 6px; border-radius:2px; border:1px solid transparent;
  transition: all 0.15s;
}
.legend-item:last-child { margin-bottom:0; }
.legend-item:hover { opacity:0.75; }
.legend-item.selected { border-color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.04); }
.l-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.l-label { font-size:12px; font-weight:600; }
.l-count { font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,0.3); margin-left:auto; }
.l-divider { margin:8px 0; border-top:1px solid rgba(255,255,255,0.05); }

/* Selected zone info panel */
.zone-info {
  position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
  z-index:20; background:rgba(6,8,16,0.94); border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px); padding:14px 22px; min-width:260px; text-align:center;
  opacity:0; transform:translateX(-50%) translateY(8px); transition:all 0.25s;
  pointer-events:none;
}
.zone-info.visible { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.zi-name { font-weight:800; font-size:16px; color:#fff; margin-bottom:4px; }
.zi-status { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; }
.zi-close { position:absolute; top:8px; right:10px; font-size:14px; color:rgba(255,255,255,0.3); cursor:pointer; }
.zi-close:hover { color:#fff; }

.city-block { position:absolute; bottom:32px; right:28px; z-index:20; text-align:right; pointer-events:none; }
.city-big { font-weight:800; font-size:72px; letter-spacing:-5px; color:rgba(255,255,255,0.03); line-height:1; }
.city-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:3px; color:rgba(255,255,255,0.15); text-transform:uppercase; }

.dl-flash { position:absolute; bottom:90px; right:28px; z-index:30; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1.5px; color:#00e676; text-transform:uppercase; padding:8px 14px; background:rgba(0,230,118,0.08); border:1px solid rgba(0,230,118,0.3); opacity:0; transition:opacity 0.3s; pointer-events:none; }
.dl-flash.show { opacity:1; }

#loader { position:fixed; inset:0; background:#060810; display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; transition:opacity 0.8s; }
#loader.hidden { opacity:0; pointer-events:none; }
.l-logo { font-weight:800; font-size:34px; letter-spacing:-1px; color:#fff; }
.l-logo span { color:#00e676; }
.l-bar { width:140px; height:2px; background:rgba(0,230,118,0.1); overflow:hidden; }
.l-bar::after { content:''; display:block; height:100%; background:#00e676; animation:ld 1.2s ease-in-out infinite; }
@keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.l-sub { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,230,118,0.3); text-transform:uppercase; }
</style>
</head>
<body>

<div id="loader"><div class="l-logo">Rai<span>pur</span></div><div class="l-bar"></div><div class="l-sub">Mapping coverage...</div></div>
<div id="map"></div>

<div class="topbar">
  <div class="brand-name">Delivery<span>OS</span></div>
  <div class="brand-tag">Raipur · Market Coverage</div>
</div>

<div class="stats-row">
  <div class="stat-card" style="border-top-color:#00e676" id="sc1"><div class="stat-num" style="color:#00e676">6</div><div class="stat-desc">Active Zones</div></div>
  <div class="stat-card" style="border-top-color:#ffab40" id="sc2"><div class="stat-num" style="color:#ffab40">4</div><div class="stat-desc">Expanding</div></div>
  <div class="stat-card" style="border-top-color:#40c4ff" id="sc3"><div class="stat-num" style="color:#40c4ff">5</div><div class="stat-desc">Coming Soon</div></div>
  <div class="stat-card" style="border-top-color:rgba(255,255,255,0.15)" id="sc4"><div class="stat-num" style="color:#fff">1.2M</div><div class="stat-desc">Addressable Pop.</div></div>
</div>

<div class="action-btns" id="action-btns">
  <button class="act-btn on" id="toggle-btn" onclick="toggleEffects()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    Effects On
  </button>
  <button class="act-btn" onclick="downloadPNG()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PNG
  </button>
</div>

<div class="legend" id="legend">
  <div class="legend-title">Click zone to select</div>
  <div class="legend-item" id="li-active" onclick="filterTo('active')">
    <div class="l-dot" style="background:#00e676;box-shadow:0 0 5px #00e676"></div>
    <div class="l-label">Active</div><div class="l-count">6 zones</div>
  </div>
  <div class="legend-item" id="li-expanding" onclick="filterTo('expanding')">
    <div class="l-dot" style="background:#ffab40;box-shadow:0 0 5px #ffab40"></div>
    <div class="l-label">Expanding</div><div class="l-count">4 zones</div>
  </div>
  <div class="legend-item" id="li-soon" onclick="filterTo('soon')">
    <div class="l-dot" style="background:#40c4ff;box-shadow:0 0 5px #40c4ff;opacity:0.6"></div>
    <div class="l-label">Coming Soon</div><div class="l-count">5 zones</div>
  </div>
  <div class="l-divider"></div>
  <div class="legend-item" id="li-all" onclick="filterTo('all')">
    <div class="l-dot" style="background:rgba(255,255,255,0.25)"></div>
    <div class="l-label" style="color:rgba(255,255,255,0.4);font-size:11px">Show All</div>
  </div>
</div>

<!-- Selected zone panel -->
<div class="zone-info" id="zone-info">
  <span class="zi-close" onclick="clearSelection()">✕</span>
  <div class="zi-name" id="zi-name">—</div>
  <div class="zi-status" id="zi-status">—</div>
</div>

<div class="city-block"><div class="city-big">RPR</div><div class="city-sub">Chhattisgarh · India</div></div>
<div class="dl-flash" id="dl-flash">✓ Saved to Downloads</div>

<script>
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

const zones = [
  { id:'old-raipur',     name:'Old Raipur',      status:'active',    density:0.90,
    poly:[[81.616,21.226],[81.640,21.226],[81.640,21.244],[81.616,21.244]] },
  { id:'purani-basti',   name:'Purani Basti',     status:'active',    density:0.85,
    poly:[[81.629,21.234],[81.646,21.234],[81.646,21.248],[81.629,21.248]] },
  { id:'tatibandh',      name:'Tatibandh',        status:'active',    density:0.80,
    poly:[[81.597,21.226],[81.618,21.226],[81.618,21.244],[81.597,21.244]] },
  { id:'telibandha',     name:'Telibandha',       status:'active',    density:0.88,
    poly:[[81.604,21.238],[81.626,21.238],[81.626,21.256],[81.604,21.256]] },
  { id:'civil-lines',    name:'Civil Lines',      status:'active',    density:0.75,
    poly:[[81.609,21.248],[81.632,21.248],[81.632,21.267],[81.609,21.267]] },
  { id:'pandri',         name:'Pandri',           status:'active',    density:0.82,
    poly:[[81.648,21.229],[81.669,21.229],[81.669,21.247],[81.648,21.247]] },
  { id:'shankar-nagar',  name:'Shankar Nagar',    status:'expanding', density:0.60,
    poly:[[81.652,21.248],[81.674,21.248],[81.674,21.265],[81.652,21.265]] },
  { id:'avanti-vihar',   name:'Avanti Vihar',     status:'expanding', density:0.55,
    poly:[[81.641,21.252],[81.659,21.252],[81.659,21.268],[81.641,21.268]] },
  { id:'devendra-nagar', name:'Devendra Nagar',   status:'expanding', density:0.58,
    poly:[[81.596,21.248],[81.614,21.248],[81.614,21.266],[81.596,21.266]] },
  { id:'fafadih',        name:'Fafadih',          status:'expanding', density:0.52,
    poly:[[81.635,21.258],[81.656,21.258],[81.656,21.275],[81.635,21.275]] },
  { id:'mowa',           name:'Mowa',             status:'soon',      density:0.30,
    poly:[[81.620,21.268],[81.646,21.268],[81.646,21.286],[81.620,21.286]] },
  { id:'tikrapara',      name:'Tikrapara',        status:'soon',      density:0.28,
    poly:[[81.637,21.216],[81.657,21.216],[81.657,21.231],[81.637,21.231]] },
  { id:'pachpedi',       name:'Pachpedi Naka',    status:'soon',      density:0.32,
    poly:[[81.614,21.216],[81.634,21.216],[81.634,21.231],[81.614,21.231]] },
  { id:'khamtarai',      name:'Khamtarai',        status:'soon',      density:0.25,
    poly:[[81.657,21.239],[81.679,21.239],[81.679,21.257],[81.657,21.257]] },
  { id:'gudhiyari',      name:'Gudhiyari',        status:'soon',      density:0.22,
    poly:[[81.558,21.237],[81.580,21.237],[81.580,21.254],[81.558,21.254]] },
];

const COLOR = { active:'#00e676', expanding:'#ffab40', soon:'#40c4ff' };
const STATUS_LABEL = { active:'🟢 Active', expanding:'🟡 Expanding', soon:'🔵 Coming Soon' };
let effectsOn = true;
let selectedZone = null;
const dotLayerIds = [];

// ── GENERATE DOT GRID ────────────────────────────────────────────────────────
// For each zone, create a regular grid of points with varying size
// Points are denser/larger toward the center (gaussian falloff)
function generateDotGrid(zone) {
  const [x0, y0] = zone.poly[0];
  const [x1, y1] = zone.poly[2];
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
  const w = Math.abs(x1 - x0), h = Math.abs(y1 - y0);
  const step = 0.003; // ~300m grid spacing
  const features = [];

  for (let x = x0; x <= x1; x += step) {
    for (let y = y0; y <= y1; y += step) {
      // Distance from center (normalized 0-1)
      const dx = (x - cx) / (w * 0.5);
      const dy = (y - cy) / (h * 0.5);
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 1.1) continue; // clip to ellipse

      // Gaussian falloff from center
      const gaussian = Math.exp(-(dist*dist) / 0.6);
      // Add slight jitter so it doesn't look too mechanical
      const jx = (Math.random() - 0.5) * step * 0.4;
      const jy = (Math.random() - 0.5) * step * 0.4;

      // Size: center dots larger, edge dots smaller
      // Also scale by zone density
      const baseSize = zone.density * gaussian;
      // Skip very small dots (sparse outer areas) based on density
      if (Math.random() > zone.density * 0.7 + gaussian * 0.5) continue;

      features.push({
        type: 'Feature',
        geometry: { type:'Point', coordinates:[x + jx, y + jy] },
        properties: {
          size: baseSize,         // 0-1, used for circle-radius
          opacity: gaussian * zone.density,
          zoneId: zone.id
        }
      });
    }
  }
  return features;
}

mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [81.635, 21.250],
  zoom: 10.8, pitch: 0, bearing: 0,
  antialias: true,
  preserveDrawingBuffer: true
});

map.on('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    ['sc1','sc2','sc3','sc4'].forEach((id,i) => setTimeout(() => document.getElementById(id).classList.add('visible'), i*100));
    document.getElementById('legend').classList.add('visible');
    document.getElementById('action-btns').classList.add('visible');

    // Cinematic zoom after 2s
    setTimeout(() => {
      map.flyTo({
        center:[81.628,21.244], zoom:13.5, pitch:45, bearing:-16,
        duration:3800, easing:t=>t<0.5?2*t*t:-1+(4-2*t)*t
      });
    }, 2000);
  }, 600);

  // Subtle dark base buildings
  map.addLayer({
    id:'base-buildings', source:'composite', 'source-layer':'building',
    filter:['==','extrude','true'], type:'fill-extrusion', minzoom:13,
    paint:{
      'fill-extrusion-color':'#0a1220',
      'fill-extrusion-height':['get','height'],
      'fill-extrusion-base':['get','min_height'],
      'fill-extrusion-opacity':0.85
    }
  });

  // Add dot layers per zone
  zones.forEach(z => {
    const color = COLOR[z.status];
    const dots = generateDotGrid(z);

    map.addSource(`dots-${z.id}`, {
      type: 'geojson',
      data: { type:'FeatureCollection', features: dots }
    });

    // ── Main dot layer ──
    map.addLayer({
      id: `dots-${z.id}`,
      type: 'circle',
      source: `dots-${z.id}`,
      paint: {
        'circle-color': color,
        // Radius scales with dot size property + zoom level
        'circle-radius': [
          'interpolate', ['linear'], ['zoom'],
          10, ['*', ['get','size'], 4],
          12, ['*', ['get','size'], 8],
          14, ['*', ['get','size'], 14],
          16, ['*', ['get','size'], 20]
        ],
        'circle-opacity': ['*', ['get','opacity'], 0.85],
        'circle-blur': 0.15,
        // Soft glow via stroke
        'circle-stroke-width': ['interpolate',['linear'],['zoom'], 10,0, 13,0.5, 16,1],
        'circle-stroke-color': color,
        'circle-stroke-opacity': ['*', ['get','opacity'], 0.3],
      }
    });
    dotLayerIds.push(`dots-${z.id}`);

    // ── Invisible hit area for click selection ──
    const geom = { type:'Polygon', coordinates:[[...z.poly, z.poly[0]]] };
    map.addSource(`hit-${z.id}`, { type:'geojson', data:{ type:'Feature', geometry:geom, properties:{} } });
    map.addLayer({
      id: `hit-${z.id}`, type:'fill', source:`hit-${z.id}`,
      paint:{ 'fill-color':'transparent', 'fill-opacity':0 }
    });

    // Click to select
    map.on('click', `hit-${z.id}`, () => selectZone(z));
    map.on('mouseenter', `hit-${z.id}`, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', `hit-${z.id}`, () => map.getCanvas().style.cursor = '');
  });
});

// ── SELECTION ────────────────────────────────────────────────────────────────
function selectZone(z) {
  selectedZone = z;
  const color = COLOR[z.status];

  // Dim all zones, boost selected
  zones.forEach(other => {
    if (!map.getLayer(`dots-${other.id}`)) return;
    if (other.id === z.id) {
      map.setPaintProperty(`dots-${other.id}`, 'circle-opacity',
        ['*', ['get','opacity'], 1.15]);
      map.setPaintProperty(`dots-${other.id}`, 'circle-radius', [
        'interpolate',['linear'],['zoom'],
        10,['*',['get','size'],5.5],
        12,['*',['get','size'],11],
        14,['*',['get','size'],18],
        16,['*',['get','size'],26]
      ]);
    } else {
      map.setPaintProperty(`dots-${other.id}`, 'circle-opacity',
        ['*', ['get','opacity'], 0.25]);
    }
  });

  // Show info panel
  document.getElementById('zi-name').textContent = z.name;
  document.getElementById('zi-name').style.color = color;
  document.getElementById('zi-status').textContent = STATUS_LABEL[z.status];
  document.getElementById('zi-status').style.color = color;
  document.getElementById('zone-info').classList.add('visible');

  // Fly to zone center
  const cx = (z.poly[0][0] + z.poly[2][0]) / 2;
  const cy = (z.poly[0][1] + z.poly[2][1]) / 2;
  map.flyTo({ center:[cx,cy], zoom:Math.max(map.getZoom(), 13.5), duration:800 });
}

function clearSelection() {
  selectedZone = null;
  document.getElementById('zone-info').classList.remove('visible');
  // Restore all zones
  zones.forEach(z => {
    if (!map.getLayer(`dots-${z.id}`)) return;
    map.setPaintProperty(`dots-${z.id}`, 'circle-opacity', ['*',['get','opacity'],0.85]);
    map.setPaintProperty(`dots-${z.id}`, 'circle-radius', [
      'interpolate',['linear'],['zoom'],
      10,['*',['get','size'],4],
      12,['*',['get','size'],8],
      14,['*',['get','size'],14],
      16,['*',['get','size'],20]
    ]);
  });
}

// Click on empty map = clear selection
map.on('click', e => {
  const hit = zones.some(z => map.queryRenderedFeatures(e.point, {layers:[`hit-${z.id}`]}).length > 0);
  if (!hit) clearSelection();
});

// ── FILTER BY STATUS ─────────────────────────────────────────────────────────
function filterTo(status) {
  clearSelection();
  ['active','expanding','soon','all'].forEach(s => {
    const el = document.getElementById(`li-${s}`);
    if (el) el.classList.remove('selected');
  });
  document.getElementById(`li-${status}`)?.classList.add('selected');

  zones.forEach(z => {
    const vis = (status==='all' || z.status===status) ? 'visible' : 'none';
    if (map.getLayer(`dots-${z.id}`)) map.setLayoutProperty(`dots-${z.id}`,'visibility',vis);
    if (map.getLayer(`hit-${z.id}`)) map.setLayoutProperty(`hit-${z.id}`,'visibility',vis);
  });
}

// ── TOGGLE EFFECTS ───────────────────────────────────────────────────────────
function toggleEffects() {
  effectsOn = !effectsOn;
  const vis = effectsOn ? 'visible' : 'none';
  dotLayerIds.forEach(id => { if(map.getLayer(id)) map.setLayoutProperty(id,'visibility',vis); });
  const btn = document.getElementById('toggle-btn');
  btn.classList.toggle('on', effectsOn);
  btn.innerHTML = effectsOn
    ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg> Effects On`
    : `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9a3 3 0 0 0 5.12 2.12M4 4l16 16M3 12c0-5 4-9 9-9a9 9 0 0 1 8.46 5.83"/></svg> Effects Off`;
}

// ── DOWNLOAD PNG ─────────────────────────────────────────────────────────────
function downloadPNG() {
  map.once('render', () => {
    const a = document.createElement('a');
    a.href = map.getCanvas().toDataURL('image/png');
    a.download = `raipur-coverage-${Date.now()}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    const f = document.getElementById('dl-flash');
    f.classList.add('show');
    setTimeout(() => f.classList.remove('show'), 2200);
  });
  map.triggerRepaint();
}
</script>
</body>
</html>
