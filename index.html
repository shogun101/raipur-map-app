<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --panel-bg: rgba(8,8,12,0.96);
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f8;
  --muted: rgba(240,240,248,0.35);
  --accent: #fff;
  --radius: 6px;
}
body { background:#000; font-family:'Syne',sans-serif; color:var(--text); height:100vh; overflow:hidden; }
#map { position:absolute; inset:0; }
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib { display:none !important; }

/* ─── TOPBAR ─── */
.topbar {
  position:absolute; top:0; left:0; right:0; z-index:20; pointer-events:none;
  padding:22px 28px;
  background:linear-gradient(180deg,rgba(0,0,0,0.88) 0%,transparent 100%);
}
.brand { font-weight:800; font-size:20px; letter-spacing:-0.5px; color:#fff; }
.brand span { color:var(--theme-color, #00e676); transition:color 0.4s; }
.brand-sub { font-family:'Space Mono',monospace; font-size:8.5px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:3px; }

/* ─── STATS ─── */
.stats-row { position:absolute; top:20px; right:28px; z-index:20; display:flex; gap:8px; }
.s-card {
  background:var(--panel-bg); border:1px solid var(--border);
  backdrop-filter:blur(20px); padding:11px 16px; text-align:center;
  border-top:2px solid; opacity:0; transform:translateY(-6px);
  transition:opacity 0.4s, transform 0.4s, border-top-color 0.4s;
}
.s-card.show { opacity:1; transform:translateY(0); }
.s-num { font-weight:800; font-size:24px; letter-spacing:-1px; line-height:1; transition:color 0.4s; }
.s-lbl { font-family:'Space Mono',monospace; font-size:7.5px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-top:3px; }

/* ─── CONTROL PANEL ─── */
.panel {
  position:absolute; bottom:0; left:0; top:0; z-index:20; width:280px;
  background:var(--panel-bg); border-right:1px solid var(--border);
  backdrop-filter:blur(24px); display:flex; flex-direction:column;
  opacity:0; transform:translateX(-10px);
  transition:opacity 0.5s 0.2s, transform 0.5s 0.2s;
  overflow:hidden;
}
.panel.show { opacity:1; transform:translateX(0); }

.panel-header { padding:22px 20px 16px; border-bottom:1px solid var(--border); }
.panel-title { font-weight:800; font-size:16px; letter-spacing:-0.3px; }
.panel-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; margin-top:4px; }

.panel-section { padding:14px 20px; border-bottom:1px solid var(--border); }
.sec-label { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }

/* ─── THEME SWATCHES ─── */
.theme-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.swatch {
  height:40px; border-radius:var(--radius); cursor:pointer;
  border:2px solid transparent; transition:all 0.2s;
  display:flex; align-items:flex-end; justify-content:center;
  padding-bottom:4px; position:relative; overflow:hidden;
}
.swatch::before {
  content:''; position:absolute; inset:0; border-radius:4px;
  opacity:0.9;
}
.swatch.active { border-color:rgba(255,255,255,0.7); transform:scale(1.06); }
.swatch:hover:not(.active) { border-color:rgba(255,255,255,0.25); transform:scale(1.03); }
.swatch-name { font-family:'Space Mono',monospace; font-size:7px; letter-spacing:0.5px; color:rgba(255,255,255,0.7); position:relative; z-index:1; text-transform:uppercase; }

/* ─── DIALKIT SLIDERS ─── */
.slider-group { margin-bottom:14px; }
.slider-group:last-child { margin-bottom:0; }
.slider-row-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.slider-row-label .name { font-size:11px; font-weight:600; color:var(--text); }
.slider-row-label .val { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
.dial-slider { position:relative; height:20px; display:flex; align-items:center; }
.dial-track { position:absolute; left:0; right:0; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.dial-fill { position:absolute; left:0; height:100%; border-radius:2px; transition:width 0.05s, background 0.4s; }
.dial-input {
  position:absolute; width:100%; height:100%; opacity:0; cursor:pointer;
  -webkit-appearance:none; margin:0;
}
.dial-thumb-vis {
  position:absolute; width:14px; height:14px; border-radius:50%;
  background:#fff; border:2px solid rgba(255,255,255,0.9);
  box-shadow:0 0 8px rgba(255,255,255,0.4);
  pointer-events:none; transition:left 0.05s, background 0.4s, box-shadow 0.4s;
  transform:translateX(-50%);
}

/* ─── ZONE LIST ─── */
.zones-scroll { flex:1; overflow-y:auto; }
.zones-scroll::-webkit-scrollbar { width:3px; }
.zones-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.zone-row {
  padding:9px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; cursor:pointer;
  transition:background 0.15s;
}
.zone-row:hover { background:rgba(255,255,255,0.03); }
.zone-row.selected { background:rgba(255,255,255,0.06); }
.z-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:box-shadow 0.4s; }
.z-name { font-size:11.5px; font-weight:600; flex:1; }
.z-status { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }

/* ─── BOTTOM ACTION BAR ─── */
.panel-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; }
.f-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  background:rgba(255,255,255,0.05); border:1px solid var(--border);
  color:var(--muted); font-family:'Space Mono',monospace; font-size:8.5px;
  letter-spacing:1.5px; text-transform:uppercase; padding:9px 8px;
  cursor:pointer; border-radius:var(--radius); transition:all 0.2s;
}
.f-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); border-color:rgba(255,255,255,0.15); }
.f-btn.on { border-color:var(--theme-color,#00e676); color:var(--theme-color,#00e676); background:rgba(0,230,118,0.05); }

/* ─── CITY WATERMARK ─── */
.city-wm { position:absolute; bottom:28px; right:28px; z-index:10; text-align:right; pointer-events:none; }
.city-wm-big { font-weight:800; font-size:80px; letter-spacing:-6px; color:rgba(255,255,255,0.025); line-height:1; }
.city-wm-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:3px; color:rgba(255,255,255,0.12); text-transform:uppercase; }

.dl-toast { position:absolute; bottom:80px; right:28px; z-index:30; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1.5px; color:#00e676; text-transform:uppercase; padding:8px 14px; background:rgba(0,230,118,0.07); border:1px solid rgba(0,230,118,0.25); border-radius:var(--radius); opacity:0; transition:opacity 0.3s; pointer-events:none; }
.dl-toast.show { opacity:1; }

#loader { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; transition:opacity 0.8s; }
#loader.hidden { opacity:0; pointer-events:none; }
.l-logo { font-weight:800; font-size:34px; letter-spacing:-1px; color:#fff; }
.l-logo span { color:#00e676; }
.l-bar { width:120px; height:2px; background:rgba(255,255,255,0.06); overflow:hidden; }
.l-bar::after { content:''; display:block; height:100%; background:#00e676; animation:ld 1.2s ease-in-out infinite; }
@keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.l-sub { font-family:'Space Mono',monospace; font-size:8.5px; letter-spacing:3px; color:rgba(0,230,118,0.3); text-transform:uppercase; }
</style>
</head>
<body>

<div id="loader"><div class="l-logo">Rai<span>pur</span></div><div class="l-bar"></div><div class="l-sub">Mapping coverage...</div></div>
<div id="map"></div>

<div class="topbar">
  <div class="brand">Delivery<span id="brand-accent">OS</span></div>
  <div class="brand-sub">Raipur · Market Coverage</div>
</div>

<div class="stats-row">
  <div class="s-card" id="sc1" style="border-top-color:#00e676"><div class="s-num" id="sn1" style="color:#00e676">6</div><div class="s-lbl">Active</div></div>
  <div class="s-card" id="sc2" style="border-top-color:#ffab40"><div class="s-num" id="sn2" style="color:#ffab40">4</div><div class="s-lbl">Expanding</div></div>
  <div class="s-card" id="sc3" style="border-top-color:#40c4ff"><div class="s-num" id="sn3" style="color:#40c4ff">5</div><div class="s-lbl">Soon</div></div>
  <div class="s-card" id="sc4" style="border-top-color:rgba(255,255,255,0.15)"><div class="s-num" style="color:#fff">1.2M</div><div class="s-lbl">Pop.</div></div>
</div>

<!-- CONTROL PANEL -->
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title">Coverage Map</div>
    <div class="panel-sub">Raipur · 15 zones</div>
  </div>

  <!-- Theme -->
  <div class="panel-section">
    <div class="sec-label">Theme</div>
    <div class="theme-grid" id="theme-grid"></div>
  </div>

  <!-- Sliders -->
  <div class="panel-section">
    <div class="sec-label">Display</div>
    <div class="slider-group">
      <div class="slider-row-label"><span class="name">Dot Size</span><span class="val" id="val-size">1.0×</span></div>
      <div class="dial-slider">
        <div class="dial-track"><div class="dial-fill" id="fill-size"></div></div>
        <input type="range" class="dial-input" min="0.3" max="2.5" step="0.05" value="1" id="sl-size" oninput="updateSlider('size',this.value)">
        <div class="dial-thumb-vis" id="thumb-size"></div>
      </div>
    </div>
    <div class="slider-group">
      <div class="slider-row-label"><span class="name">Glow Intensity</span><span class="val" id="val-glow">0.6</span></div>
      <div class="dial-slider">
        <div class="dial-track"><div class="dial-fill" id="fill-glow"></div></div>
        <input type="range" class="dial-input" min="0" max="1" step="0.02" value="0.6" id="sl-glow" oninput="updateSlider('glow',this.value)">
        <div class="dial-thumb-vis" id="thumb-glow"></div>
      </div>
    </div>
    <div class="slider-group">
      <div class="slider-row-label"><span class="name">Opacity</span><span class="val" id="val-opacity">85%</span></div>
      <div class="dial-slider">
        <div class="dial-track"><div class="dial-fill" id="fill-opacity"></div></div>
        <input type="range" class="dial-input" min="10" max="100" step="1" value="85" id="sl-opacity" oninput="updateSlider('opacity',this.value)">
        <div class="dial-thumb-vis" id="thumb-opacity"></div>
      </div>
    </div>
  </div>

  <!-- Zones -->
  <div class="panel-section" style="padding-bottom:8px">
    <div class="sec-label">Zones — click to select</div>
  </div>
  <div class="zones-scroll" id="zones-list"></div>

  <!-- Footer -->
  <div class="panel-footer">
    <button class="f-btn on" id="fx-btn" onclick="toggleFX()">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2"/></svg>
      FX
    </button>
    <button class="f-btn" onclick="filterZones('all')">All</button>
    <button class="f-btn" onclick="downloadPNG()">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PNG
    </button>
  </div>
</div>

<div class="city-wm"><div class="city-wm-big">RPR</div><div class="city-wm-sub">Chhattisgarh</div></div>
<div class="dl-toast" id="dl-toast">✓ Saved to Downloads</div>

<script>
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

// ── THEMES ─────────────────────────────────────────────────────────────────
const THEMES = [
  { id:'citylights', name:'City',   colors:{ active:'#ffd54f', expanding:'#ff8a65', soon:'#ef9a9a'  }, bg:'linear-gradient(135deg,#2a1a00,#1a0800)' },
  { id:'neon',       name:'Neon',   colors:{ active:'#00e676', expanding:'#69ff47', soon:'#b9f6ca'  }, bg:'linear-gradient(135deg,#001a0a,#000d05)' },
  { id:'plasma',     name:'Plasma', colors:{ active:'#e040fb', expanding:'#f06292', soon:'#ce93d8'  }, bg:'linear-gradient(135deg,#1a0020,#0d0010)' },
  { id:'ice',        name:'Ice',    colors:{ active:'#40c4ff', expanding:'#80d8ff', soon:'#b3e5fc'  }, bg:'linear-gradient(135deg,#00101a,#000810)' },
  { id:'ember',      name:'Ember',  colors:{ active:'#ff5252', expanding:'#ff6d00', soon:'#ffab40'  }, bg:'linear-gradient(135deg,#1a0500,#0d0300)' },
];
let currentTheme = THEMES[0];
let dotSizeMul = 1.0, glowIntensity = 0.6, opacityMul = 0.85;
let fxOn = true, selectedZoneId = null;

const zones = [
  { id:'old-raipur',     name:'Old Raipur',      status:'active',    density:0.90, poly:[[81.616,21.226],[81.640,21.226],[81.640,21.244],[81.616,21.244]] },
  { id:'purani-basti',   name:'Purani Basti',     status:'active',    density:0.85, poly:[[81.629,21.234],[81.646,21.234],[81.646,21.248],[81.629,21.248]] },
  { id:'tatibandh',      name:'Tatibandh',        status:'active',    density:0.80, poly:[[81.597,21.226],[81.618,21.226],[81.618,21.244],[81.597,21.244]] },
  { id:'telibandha',     name:'Telibandha',       status:'active',    density:0.88, poly:[[81.604,21.238],[81.626,21.238],[81.626,21.256],[81.604,21.256]] },
  { id:'civil-lines',    name:'Civil Lines',      status:'active',    density:0.75, poly:[[81.609,21.248],[81.632,21.248],[81.632,21.267],[81.609,21.267]] },
  { id:'pandri',         name:'Pandri',           status:'active',    density:0.82, poly:[[81.648,21.229],[81.669,21.229],[81.669,21.247],[81.648,21.247]] },
  { id:'shankar-nagar',  name:'Shankar Nagar',    status:'expanding', density:0.60, poly:[[81.652,21.248],[81.674,21.248],[81.674,21.265],[81.652,21.265]] },
  { id:'avanti-vihar',   name:'Avanti Vihar',     status:'expanding', density:0.55, poly:[[81.641,21.252],[81.659,21.252],[81.659,21.268],[81.641,21.268]] },
  { id:'devendra-nagar', name:'Devendra Nagar',   status:'expanding', density:0.58, poly:[[81.596,21.248],[81.614,21.248],[81.614,21.266],[81.596,21.266]] },
  { id:'fafadih',        name:'Fafadih',          status:'expanding', density:0.52, poly:[[81.635,21.258],[81.656,21.258],[81.656,21.275],[81.635,21.275]] },
  { id:'mowa',           name:'Mowa',             status:'soon',      density:0.30, poly:[[81.620,21.268],[81.646,21.268],[81.646,21.286],[81.620,21.286]] },
  { id:'tikrapara',      name:'Tikrapara',        status:'soon',      density:0.28, poly:[[81.637,21.216],[81.657,21.216],[81.657,21.231],[81.637,21.231]] },
  { id:'pachpedi',       name:'Pachpedi Naka',    status:'soon',      density:0.32, poly:[[81.614,21.216],[81.634,21.216],[81.634,21.231],[81.614,21.231]] },
  { id:'khamtarai',      name:'Khamtarai',        status:'soon',      density:0.25, poly:[[81.657,21.239],[81.679,21.239],[81.679,21.257],[81.657,21.257]] },
  { id:'gudhiyari',      name:'Gudhiyari',        status:'soon',      density:0.22, poly:[[81.558,21.237],[81.580,21.237],[81.580,21.254],[81.558,21.254]] },
];

function generateDots(zone) {
  const [x0,y0]=zone.poly[0],[x1,y1]=zone.poly[2];
  const cx=(x0+x1)/2, cy=(y0+y1)/2, w=Math.abs(x1-x0), h=Math.abs(y1-y0);
  const step=0.0028, pts=[];
  for(let x=x0; x<=x1; x+=step) {
    for(let y=y0; y<=y1; y+=step) {
      const dx=(x-cx)/(w*0.5), dy=(y-cy)/(h*0.5);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>1.08) continue;
      const g=Math.exp(-(dist*dist)/0.55);
      if(Math.random()>zone.density*0.65+g*0.5) continue;
      const jx=(Math.random()-0.5)*step*0.45, jy=(Math.random()-0.5)*step*0.45;
      pts.push({type:'Feature',geometry:{type:'Point',coordinates:[x+jx,y+jy]},properties:{s:g*zone.density,op:g*zone.density,zid:zone.id}});
    }
  }
  return pts;
}

// ── MAPBOX ──────────────────────────────────────────────────────────────────
mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container:'map',
  // Custom pitch-black style
  style:{
    version:8,
    sources:{},
    layers:[
      {id:'bg',type:'background',paint:{'background-color':'#000000'}}
    ],
    glyphs:'mapbox://fonts/mapbox/{fontstack}/{range}',
  },
  center:[81.635,21.250], zoom:10.8, pitch:0, bearing:0,
  antialias:true, preserveDrawingBuffer:true
});

// Add mapbox vector tiles on top of pure black base
map.on('load', () => {
  // Add OSM-based road/building tiles
  map.addSource('mapbox-streets', {
    type:'vector',
    url:'mapbox://mapbox.mapbox-streets-v8'
  });

  // Very subtle road lines — barely visible, just for geography context
  map.addLayer({
    id:'roads', type:'line',
    source:'mapbox-streets', 'source-layer':'road',
    paint:{
      'line-color':'rgba(255,255,255,0.06)',
      'line-width':['interpolate',['linear'],['zoom'],10,0.5,14,1.5,17,3]
    }
  });

  // Water — very dark blue, barely visible
  map.addLayer({
    id:'water', type:'fill',
    source:'mapbox-streets', 'source-layer':'water',
    paint:{ 'fill-color':'rgba(10,18,35,0.8)' }
  }, 'roads');

  buildUI();
  addDotLayers();

  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    ['sc1','sc2','sc3','sc4'].forEach((id,i)=>setTimeout(()=>document.getElementById(id).classList.add('show'),i*80));
    document.getElementById('panel').classList.add('show');
    setTimeout(()=>{
      map.flyTo({center:[81.628,21.244],zoom:13.5,pitch:0,bearing:0,duration:3600,easing:t=>t<0.5?2*t*t:-1+(4-2*t)*t});
    },1800);
  }, 500);
});

function addDotLayers() {
  zones.forEach(z=>{
    const id=`dots-${z.id}`;
    if(map.getSource(id)) map.removeLayer(id), map.removeSource(id);
    const color = currentTheme.colors[z.status];
    map.addSource(id,{type:'geojson',data:{type:'FeatureCollection',features:generateDots(z)}});
    map.addLayer({
      id,type:'circle',source:id,
      paint:{
        'circle-color': color,
        'circle-radius':['interpolate',['linear'],['zoom'],
          10,['*',['get','s'],3*dotSizeMul],
          12,['*',['get','s'],6*dotSizeMul],
          14,['*',['get','s'],12*dotSizeMul],
          16,['*',['get','s'],18*dotSizeMul]],
        'circle-opacity':['*',['get','op'], opacityMul],
        'circle-blur': glowIntensity,
        'circle-stroke-width':['interpolate',['linear'],['zoom'],11,0,13,1,16,2],
        'circle-stroke-color': color,
        'circle-stroke-opacity':['*',['get','op'],0.2]
      }
    });

    // Invisible hit zone
    const hitId=`hit-${z.id}`;
    if(map.getSource(hitId)) map.removeLayer(hitId), map.removeSource(hitId);
    const geom={type:'Polygon',coordinates:[[...z.poly,z.poly[0]]]};
    map.addSource(hitId,{type:'geojson',data:{type:'Feature',geometry:geom,properties:{}}});
    map.addLayer({id:hitId,type:'fill',source:hitId,paint:{'fill-color':'transparent','fill-opacity':0}});
    map.on('click',hitId,()=>selectZone(z.id));
    map.on('mouseenter',hitId,()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave',hitId,()=>map.getCanvas().style.cursor='');
  });
}

// ── THEME ENGINE ────────────────────────────────────────────────────────────
function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.style.setProperty('--theme-color', theme.colors.active);

  // Update dot colors
  zones.forEach(z=>{
    const id=`dots-${z.id}`;
    if(!map.getLayer(id)) return;
    const c=theme.colors[z.status];
    map.setPaintProperty(id,'circle-color',c);
    map.setPaintProperty(id,'circle-stroke-color',c);
  });

  // Update stat card colors
  const cols=[theme.colors.active, theme.colors.expanding, theme.colors.soon];
  ['sc1','sc2','sc3'].forEach((id,i)=>{
    document.getElementById(id).style.borderTopColor=cols[i];
    document.getElementById(`sn${i+1}`).style.color=cols[i];
  });

  // Update fx btn color
  document.getElementById('fx-btn').style.borderColor=theme.colors.active;
  document.getElementById('fx-btn').style.color=theme.colors.active;

  // Update zone list dots
  zones.forEach(z=>{
    const dot=document.getElementById(`zdot-${z.id}`);
    if(dot){ dot.style.background=theme.colors[z.status]; dot.style.boxShadow=`0 0 5px ${theme.colors[z.status]}`; }
  });

  // Update fill colors on sliders
  ['size','glow','opacity'].forEach(k=>updateSliderUI(k));

  // Active swatch
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.id===theme.id));
}

// ── UI BUILDER ──────────────────────────────────────────────────────────────
function buildUI() {
  // Theme swatches
  const grid=document.getElementById('theme-grid');
  THEMES.forEach(t=>{
    const s=document.createElement('div');
    s.className='swatch'+(t.id===currentTheme.id?' active':'');
    s.dataset.id=t.id;
    s.style.background=t.bg;
    s.style.boxShadow=`0 0 8px ${t.colors.active}60`;
    s.innerHTML=`<div style="width:100%;height:100%;border-radius:4px;background:radial-gradient(circle at 50% 60%,${t.colors.active}99,transparent 70%)"></div><span class="swatch-name" style="position:absolute;bottom:3px;font-size:6.5px;color:rgba(255,255,255,0.6)">${t.name}</span>`;
    s.onclick=()=>applyTheme(t);
    grid.appendChild(s);
  });

  // Zone list
  const list=document.getElementById('zones-list');
  zones.forEach(z=>{
    const row=document.createElement('div');
    row.className='zone-row'; row.id=`zrow-${z.id}`;
    const statusText={active:'Active',expanding:'Expanding',soon:'Soon'};
    row.innerHTML=`<div class="z-dot" id="zdot-${z.id}" style="background:${currentTheme.colors[z.status]};box-shadow:0 0 5px ${currentTheme.colors[z.status]}"></div><div class="z-name">${z.name}</div><div class="z-status">${statusText[z.status]}</div>`;
    row.onclick=()=>selectZone(z.id);
    list.appendChild(row);
  });

  // Init sliders
  ['size','glow','opacity'].forEach(k=>updateSliderUI(k));
}

// ── DIALKIT SLIDER ──────────────────────────────────────────────────────────
function updateSlider(key, val) {
  val = parseFloat(val);
  if(key==='size') {
    dotSizeMul=val;
    document.getElementById('val-size').textContent=val.toFixed(1)+'×';
    zones.forEach(z=>{
      const id=`dots-${z.id}`;
      if(!map.getLayer(id)) return;
      map.setPaintProperty(id,'circle-radius',['interpolate',['linear'],['zoom'],
        10,['*',['get','s'],3*val],12,['*',['get','s'],6*val],
        14,['*',['get','s'],12*val],16,['*',['get','s'],18*val]]);
    });
  } else if(key==='glow') {
    glowIntensity=val;
    document.getElementById('val-glow').textContent=val.toFixed(2);
    zones.forEach(z=>{ if(map.getLayer(`dots-${z.id}`)) map.setPaintProperty(`dots-${z.id}`,'circle-blur',val); });
  } else if(key==='opacity') {
    opacityMul=val/100;
    document.getElementById('val-opacity').textContent=Math.round(val)+'%';
    zones.forEach(z=>{
      if(map.getLayer(`dots-${z.id}`)) map.setPaintProperty(`dots-${z.id}`,'circle-opacity',['*',['get','op'],opacityMul]);
    });
  }
  updateSliderUI(key);
}

function updateSliderUI(key) {
  const sl=document.getElementById(`sl-${key}`);
  if(!sl) return;
  const min=parseFloat(sl.min), max=parseFloat(sl.max), val=parseFloat(sl.value);
  const pct=((val-min)/(max-min))*100;
  const fill=document.getElementById(`fill-${key}`);
  const thumb=document.getElementById(`thumb-${key}`);
  const col=currentTheme.colors.active;
  if(fill){ fill.style.width=pct+'%'; fill.style.background=col; }
  if(thumb){ thumb.style.left=pct+'%'; thumb.style.background=col; thumb.style.boxShadow=`0 0 8px ${col}80`; }
}

// ── SELECTION ────────────────────────────────────────────────────────────────
function selectZone(zid) {
  selectedZoneId = zid;
  zones.forEach(z=>{
    const isSelected = z.id===zid;
    const id=`dots-${z.id}`;
    if(!map.getLayer(id)) return;
    map.setPaintProperty(id,'circle-opacity',['*',['get','op'], isSelected ? Math.min(opacityMul*1.3,1) : opacityMul*0.22]);
    const row=document.getElementById(`zrow-${z.id}`);
    if(row) row.classList.toggle('selected',isSelected);
  });
  const z=zones.find(z=>z.id===zid);
  if(z){
    const cx=(z.poly[0][0]+z.poly[2][0])/2, cy=(z.poly[0][1]+z.poly[2][1])/2;
    map.flyTo({center:[cx,cy],zoom:Math.max(map.getZoom(),13),duration:700});
  }
}

function filterZones(status) {
  selectedZoneId=null;
  document.querySelectorAll('.zone-row').forEach(r=>r.classList.remove('selected'));
  zones.forEach(z=>{
    const vis=(status==='all'||z.status===status)?'visible':'none';
    if(map.getLayer(`dots-${z.id}`)) map.setLayoutProperty(`dots-${z.id}`,'visibility',vis);
    if(map.getLayer(`hit-${z.id}`)) map.setLayoutProperty(`hit-${z.id}`,'visibility',vis);
    // Restore opacity
    if(map.getLayer(`dots-${z.id}`)) map.setPaintProperty(`dots-${z.id}`,'circle-opacity',['*',['get','op'],opacityMul]);
  });
}

map.on('click',e=>{
  const hitLayers=zones.map(z=>`hit-${z.id}`).filter(id=>map.getLayer(id));
  const hits=map.queryRenderedFeatures(e.point,{layers:hitLayers});
  if(!hits.length){
    selectedZoneId=null;
    document.querySelectorAll('.zone-row').forEach(r=>r.classList.remove('selected'));
    zones.forEach(z=>{ if(map.getLayer(`dots-${z.id}`)) map.setPaintProperty(`dots-${z.id}`,'circle-opacity',['*',['get','op'],opacityMul]); });
  }
});

// ── FX TOGGLE ────────────────────────────────────────────────────────────────
function toggleFX() {
  fxOn=!fxOn;
  const vis=fxOn?'visible':'none';
  zones.forEach(z=>{ if(map.getLayer(`dots-${z.id}`)) map.setLayoutProperty(`dots-${z.id}`,'visibility',vis); });
  const btn=document.getElementById('fx-btn');
  btn.classList.toggle('on',fxOn);
  btn.style.borderColor=fxOn?currentTheme.colors.active:'rgba(255,255,255,0.08)';
  btn.style.color=fxOn?currentTheme.colors.active:'rgba(240,240,248,0.35)';
}

// ── DOWNLOAD PNG ─────────────────────────────────────────────────────────────
function downloadPNG() {
  map.once('render',()=>{
    const a=document.createElement('a');
    a.href=map.getCanvas().toDataURL('image/png');
    a.download=`raipur-${currentTheme.id}-${Date.now()}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    const t=document.getElementById('dl-toast');
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
  });
  map.triggerRepaint();
}
</script>
