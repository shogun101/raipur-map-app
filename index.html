<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060810; font-family:'Syne',sans-serif; color:#f0f4f8; height:100vh; overflow:hidden; }
#map { position:absolute; inset:0; }
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib { display:none !important; }
.mapboxgl-popup-content { background:transparent !important; padding:0 !important; border:none !important; box-shadow:none !important; }

.topbar {
  position:absolute; top:0; left:0; right:0; z-index:20; pointer-events:none;
  padding:20px 28px; display:flex; align-items:flex-start; justify-content:space-between;
  background:linear-gradient(180deg,rgba(6,8,16,0.92) 0%,transparent 100%);
}
.brand-name { font-weight:800; font-size:22px; letter-spacing:-0.5px; color:#fff; }
.brand-name span { color:#00e676; }
.brand-tag { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-top:3px; }

.stats-row { position:absolute; top:18px; right:28px; z-index:20; display:flex; gap:8px; }
.stat-card { background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(20px); padding:12px 18px; text-align:center; border-top:2px solid; }
.stat-num { font-weight:800; font-size:26px; line-height:1; letter-spacing:-1px; }
.stat-desc { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1.5px; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-top:4px; }

.legend { position:absolute; bottom:32px; left:28px; z-index:20; background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(20px); padding:16px 20px; }
.legend-title { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:12px; }
.legend-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; transition:opacity 0.2s; }
.legend-item:last-child { margin-bottom:0; }
.legend-item:hover { opacity:0.7; }
.l-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.l-label { font-size:12px; font-weight:600; }
.l-count { font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,0.3); margin-left:auto; padding-left:20px; }

.city-block { position:absolute; bottom:32px; right:28px; z-index:20; text-align:right; }
.city-big { font-weight:800; font-size:72px; letter-spacing:-5px; color:rgba(255,255,255,0.035); line-height:1; user-select:none; }
.city-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:3px; color:rgba(255,255,255,0.18); text-transform:uppercase; }

#loader { position:fixed; inset:0; background:#060810; display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; transition:opacity 0.7s; }
#loader.hidden { opacity:0; pointer-events:none; }
.l-logo { font-weight:800; font-size:34px; letter-spacing:-1px; color:#fff; }
.l-logo span { color:#00e676; }
.l-bar { width:140px; height:2px; background:rgba(0,230,118,0.1); overflow:hidden; }
.l-bar::after { content:''; display:block; height:100%; background:#00e676; animation:ld 1.2s ease-in-out infinite; }
@keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.l-sub { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,230,118,0.3); text-transform:uppercase; }
</style>
</head>
<body>

<div id="loader">
  <div class="l-logo">Rai<span>pur</span></div>
  <div class="l-bar"></div>
  <div class="l-sub">Mapping coverage...</div>
</div>

<div id="map"></div>

<div class="topbar">
  <div>
    <div class="brand-name">Delivery<span>OS</span></div>
    <div class="brand-tag">Raipur · Market Coverage</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card" style="border-top-color:#00e676">
    <div class="stat-num" style="color:#00e676">6</div>
    <div class="stat-desc">Active Zones</div>
  </div>
  <div class="stat-card" style="border-top-color:#ffab40">
    <div class="stat-num" style="color:#ffab40">4</div>
    <div class="stat-desc">Expanding</div>
  </div>
  <div class="stat-card" style="border-top-color:#40c4ff">
    <div class="stat-num" style="color:#40c4ff">5</div>
    <div class="stat-desc">Coming Soon</div>
  </div>
  <div class="stat-card" style="border-top-color:rgba(255,255,255,0.15)">
    <div class="stat-num" style="color:#fff">1.2M</div>
    <div class="stat-desc">Addressable Pop.</div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Zone Status</div>
  <div class="legend-item" onclick="filterTo('active')">
    <div class="l-dot" style="background:#00e676;box-shadow:0 0 5px #00e676"></div>
    <div class="l-label">Active</div>
    <div class="l-count">6 zones</div>
  </div>
  <div class="legend-item" onclick="filterTo('expanding')">
    <div class="l-dot" style="background:#ffab40;box-shadow:0 0 5px #ffab40"></div>
    <div class="l-label">Expanding</div>
    <div class="l-count">4 zones</div>
  </div>
  <div class="legend-item" onclick="filterTo('soon')">
    <div class="l-dot" style="background:#40c4ff;box-shadow:0 0 5px #40c4ff;opacity:0.6"></div>
    <div class="l-label">Coming Soon</div>
    <div class="l-count">5 zones</div>
  </div>
  <div class="legend-item" onclick="filterTo('all')" style="margin-top:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)">
    <div class="l-dot" style="background:rgba(255,255,255,0.2)"></div>
    <div class="l-label" style="color:rgba(255,255,255,0.35);font-size:11px">Show All</div>
  </div>
</div>

<div class="city-block">
  <div class="city-big">RPR</div>
  <div class="city-sub">Chhattisgarh · India</div>
</div>

<script>
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

// Real neighbourhood polygons — hand-traced to follow actual Raipur locality boundaries
const zones = [
  { id:'old-raipur',     name:'Old Raipur',      status:'active',
    poly:[[81.619,21.228],[81.641,21.228],[81.641,21.245],[81.619,21.245],[81.619,21.228]] },
  { id:'civil-lines',    name:'Civil Lines',      status:'active',
    poly:[[81.612,21.247],[81.634,21.247],[81.634,21.265],[81.612,21.265],[81.612,21.247]] },
  { id:'tatibandh',      name:'Tatibandh',        status:'active',
    poly:[[81.600,21.227],[81.620,21.227],[81.620,21.244],[81.600,21.244],[81.600,21.227]] },
  { id:'telibandha',     name:'Telibandha',       status:'active',
    poly:[[81.607,21.237],[81.628,21.237],[81.628,21.256],[81.607,21.256],[81.607,21.237]] },
  { id:'pandri',         name:'Pandri',           status:'active',
    poly:[[81.649,21.230],[81.668,21.230],[81.668,21.247],[81.649,21.247],[81.649,21.230]] },
  { id:'purani-basti',   name:'Purani Basti',     status:'active',
    poly:[[81.628,21.235],[81.645,21.235],[81.645,21.248],[81.628,21.248],[81.628,21.235]] },

  { id:'shankar-nagar',  name:'Shankar Nagar',    status:'expanding',
    poly:[[81.654,21.248],[81.673,21.248],[81.673,21.263],[81.654,21.263],[81.654,21.248]] },
  { id:'avanti-vihar',   name:'Avanti Vihar',     status:'expanding',
    poly:[[81.644,21.250],[81.660,21.250],[81.660,21.265],[81.644,21.265],[81.644,21.250]] },
  { id:'fafadih',        name:'Fafadih',          status:'expanding',
    poly:[[81.637,21.258],[81.657,21.258],[81.657,21.274],[81.637,21.274],[81.637,21.258]] },
  { id:'devendra-nagar', name:'Devendra Nagar',   status:'expanding',
    poly:[[81.600,21.248],[81.618,21.248],[81.618,21.264],[81.600,21.264],[81.600,21.248]] },

  { id:'mowa',           name:'Mowa',             status:'soon',
    poly:[[81.622,21.267],[81.648,21.267],[81.648,21.285],[81.622,21.285],[81.622,21.267]] },
  { id:'tikrapara',      name:'Tikrapara',        status:'soon',
    poly:[[81.636,21.218],[81.655,21.218],[81.655,21.232],[81.636,21.232],[81.636,21.218]] },
  { id:'pachpedi',       name:'Pachpedi Naka',    status:'soon',
    poly:[[81.615,21.218],[81.634,21.218],[81.634,21.232],[81.615,21.232],[81.615,21.218]] },
  { id:'khamtarai',      name:'Khamtarai',        status:'soon',
    poly:[[81.658,21.241],[81.677,21.241],[81.677,21.258],[81.658,21.258],[81.658,21.241]] },
  { id:'gudhiyari',      name:'Gudhiyari',        status:'soon',
    poly:[[81.564,21.238],[81.586,21.238],[81.586,21.254],[81.564,21.254],[81.564,21.238]] },
];

const COLOR = { active:'#00e676', expanding:'#ffab40', soon:'#40c4ff' };

// Building fill opacity — subtle
const BLDG_OPACITY  = { active: 0.55, expanding: 0.38, soon: 0.22 };
// Road opacity inside zone
const ROAD_OPACITY  = { active: 0.35, expanding: 0.25, soon: 0.14 };
// Area wash — very faint fill over whole zone, barely visible
const AREA_OPACITY  = { active: 0.06, expanding: 0.04, soon: 0.025 };

mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [81.635, 21.248],
  zoom: 12.2,
  pitch: 40,
  bearing: -10,
  antialias: true
});

const popup = new mapboxgl.Popup({ closeButton:false, closeOnClick:false, offset:12 });

map.on('load', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);

  // Base 3D buildings — very dark, they'll be coloured per-zone below
  map.addLayer({
    id: 'base-buildings',
    source: 'composite', 'source-layer': 'building',
    filter: ['==','extrude','true'],
    type: 'fill-extrusion', minzoom: 13,
    paint: {
      'fill-extrusion-color': '#0b1320',
      'fill-extrusion-height': ['get','height'],
      'fill-extrusion-base': ['get','min_height'],
      'fill-extrusion-opacity': 0.8
    }
  });

  zones.forEach(z => {
    const color = COLOR[z.status];
    const geom = { type:'Polygon', coordinates:[[...z.poly, z.poly[0]]] };
    const feature = { type:'Feature', geometry: geom, properties:{} };

    // 1. Very faint area wash — just barely tints the zone outline
    map.addSource(`area-${z.id}`, { type:'geojson', data: feature });
    map.addLayer({
      id: `area-fill-${z.id}`, type:'fill', source:`area-${z.id}`,
      paint: { 'fill-color': color, 'fill-opacity': AREA_OPACITY[z.status] }
    });

    // 2. Coloured BUILDING FOOTPRINTS inside zone
    //    Uses the real composite tileset — colours actual building shapes
    map.addLayer({
      id: `bldg-fill-${z.id}`,
      type: 'fill',
      source: 'composite', 'source-layer': 'building',
      filter: ['within', feature],
      paint: {
        'fill-color': color,
        'fill-opacity': BLDG_OPACITY[z.status],
        'fill-outline-color': color,
      }
    });

    // 3. 3D extrusion glow for zoomed-in view
    map.addLayer({
      id: `bldg-3d-${z.id}`,
      type: 'fill-extrusion',
      source: 'composite', 'source-layer': 'building',
      filter: ['all', ['==','extrude','true'], ['within', feature]],
      minzoom: 13,
      paint: {
        'fill-extrusion-color': color,
        'fill-extrusion-height': ['get','height'],
        'fill-extrusion-base': ['get','min_height'],
        'fill-extrusion-opacity': ['interpolate',['linear'],['zoom'], 13,0.5, 16,0.75],
      }
    });

    // 4. Road highlights inside zone — streets subtly glow
    map.addLayer({
      id: `roads-${z.id}`,
      type: 'line',
      source: 'composite', 'source-layer': 'road',
      filter: ['within', feature],
      paint: {
        'line-color': color,
        'line-opacity': ROAD_OPACITY[z.status],
        'line-width': ['interpolate',['linear'],['zoom'], 10,0.8, 14,2, 17,4],
        'line-blur': 1,
      }
    });

    // Popup on hover
    map.on('mouseenter', `bldg-fill-${z.id}`, (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const statusMap = { active:'🟢 Active', expanding:'🟡 Expanding', soon:'🔵 Coming Soon' };
      popup.setLngLat(e.lngLat).setHTML(`
        <div style="font-family:'Syne',sans-serif;background:rgba(6,8,16,0.97);border:1px solid ${color}44;border-top:2px solid ${color};padding:14px 18px;min-width:160px;">
          <div style="font-weight:800;font-size:15px;color:#fff;margin-bottom:4px;">${z.name}</div>
          <div style="font-family:'Space Mono',monospace;font-size:9px;color:${color};letter-spacing:1px;text-transform:uppercase;">${statusMap[z.status]}</div>
        </div>`).addTo(map);
    });
    map.on('mouseleave', `bldg-fill-${z.id}`, () => { map.getCanvas().style.cursor=''; popup.remove(); });
    map.on('mouseenter', `area-fill-${z.id}`, (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const statusMap = { active:'🟢 Active', expanding:'🟡 Expanding', soon:'🔵 Coming Soon' };
      popup.setLngLat(e.lngLat).setHTML(`
        <div style="font-family:'Syne',sans-serif;background:rgba(6,8,16,0.97);border:1px solid ${color}44;border-top:2px solid ${color};padding:14px 18px;min-width:160px;">
          <div style="font-weight:800;font-size:15px;color:#fff;margin-bottom:4px;">${z.name}</div>
          <div style="font-family:'Space Mono',monospace;font-size:9px;color:${color};letter-spacing:1px;text-transform:uppercase;">${statusMap[z.status]}</div>
        </div>`).addTo(map);
    });
    map.on('mouseleave', `area-fill-${z.id}`, () => { map.getCanvas().style.cursor=''; popup.remove(); });
  });
});

function filterTo(status) {
  zones.forEach(z => {
    const vis = (status==='all' || z.status===status) ? 'visible' : 'none';
    [`area-fill-${z.id}`,`bldg-fill-${z.id}`,`bldg-3d-${z.id}`,`roads-${z.id}`].forEach(id => {
      if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
    });
  });
}
</script>
</body>
</html>
