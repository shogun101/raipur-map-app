<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060810; font-family:'Syne',sans-serif; color:#f0f4f8; height:100vh; overflow:hidden; }
#map { position:absolute; inset:0; }
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib { display:none !important; }

/* TOP BAR */
.topbar {
  position:absolute; top:0; left:0; right:0; z-index:20;
  padding:20px 28px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg,rgba(6,8,16,0.9) 0%,transparent 100%);
  pointer-events:none;
}
.brand-name { font-weight:800; font-size:22px; letter-spacing:-0.5px; color:#fff; }
.brand-name span { color:#00e676; }
.brand-tag { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(240,244,248,0.35); text-transform:uppercase; margin-top:3px; }

/* STAT CARDS */
.stats-row {
  position:absolute; top:18px; right:28px; z-index:20;
  display:flex; gap:8px;
}
.stat-card {
  background:rgba(6,8,16,0.85); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); padding:12px 18px; text-align:center;
  border-top:2px solid;
}
.stat-num { font-weight:800; font-size:26px; line-height:1; letter-spacing:-1px; }
.stat-desc { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1.5px; color:rgba(240,244,248,0.35); text-transform:uppercase; margin-top:4px; }

/* LEGEND */
.legend {
  position:absolute; bottom:32px; left:28px; z-index:20;
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); padding:16px 20px; min-width:200px;
}
.legend-title { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(240,244,248,0.3); margin-bottom:12px; }
.legend-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; transition:opacity 0.2s; user-select:none; }
.legend-item:last-child { margin-bottom:0; }
.legend-item:hover { opacity:0.7; }
.glow-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; filter:blur(1.5px); }
.legend-label { font-size:12px; font-weight:600; }
.legend-count { font-family:'Space Mono',monospace; font-size:9px; color:rgba(240,244,248,0.35); margin-left:auto; }

/* CITY WATERMARK */
.city-block { position:absolute; bottom:32px; right:28px; z-index:20; text-align:right; }
.city-big { font-weight:800; font-size:64px; letter-spacing:-4px; color:rgba(255,255,255,0.04); line-height:1; user-select:none; }
.city-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:3px; color:rgba(240,244,248,0.2); text-transform:uppercase; }

/* LOADER */
#loader { position:fixed; inset:0; background:#060810; display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; transition:opacity 0.6s; }
#loader.hidden { opacity:0; pointer-events:none; }
.loader-logo { font-weight:800; font-size:34px; letter-spacing:-1px; color:#fff; }
.loader-logo span { color:#00e676; }
.loader-bar { width:140px; height:2px; background:rgba(0,230,118,0.12); overflow:hidden; }
.loader-bar::after { content:''; display:block; height:100%; background:#00e676; animation:ld 1.2s ease-in-out infinite; }
@keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.loader-sub { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,230,118,0.35); text-transform:uppercase; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Rai<span>pur</span></div>
  <div class="loader-bar"></div>
  <div class="loader-sub">Mapping coverage...</div>
</div>

<div id="map"></div>

<div class="topbar">
  <div>
    <div class="brand-name">Delivery<span>OS</span></div>
    <div class="brand-tag">Raipur · Market Coverage</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card" style="border-top-color:#00e676">
    <div class="stat-num" style="color:#00e676" id="s1">6</div>
    <div class="stat-desc">Active Zones</div>
  </div>
  <div class="stat-card" style="border-top-color:#ffab40">
    <div class="stat-num" style="color:#ffab40" id="s2">4</div>
    <div class="stat-desc">Expanding</div>
  </div>
  <div class="stat-card" style="border-top-color:#40c4ff">
    <div class="stat-num" style="color:#40c4ff" id="s3">5</div>
    <div class="stat-desc">Coming Soon</div>
  </div>
  <div class="stat-card" style="border-top-color:rgba(255,255,255,0.15)">
    <div class="stat-num" style="color:#fff">1.2M</div>
    <div class="stat-desc">Addressable Pop.</div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Coverage Status</div>
  <div class="legend-item" onclick="showOnly('active')">
    <div class="glow-dot" style="background:#00e676;box-shadow:0 0 6px #00e676"></div>
    <div class="legend-label">Active</div>
    <div class="legend-count">6 zones</div>
  </div>
  <div class="legend-item" onclick="showOnly('expanding')">
    <div class="glow-dot" style="background:#ffab40;box-shadow:0 0 6px #ffab40"></div>
    <div class="legend-label">Expanding</div>
    <div class="legend-count">4 zones</div>
  </div>
  <div class="legend-item" onclick="showOnly('soon')">
    <div class="glow-dot" style="background:#40c4ff;box-shadow:0 0 6px #40c4ff;opacity:0.6"></div>
    <div class="legend-label">Coming Soon</div>
    <div class="legend-count">5 zones</div>
  </div>
  <div class="legend-item" onclick="showOnly('all')" style="margin-top:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)">
    <div class="glow-dot" style="background:rgba(255,255,255,0.25)"></div>
    <div class="legend-label" style="color:rgba(240,244,248,0.4);font-size:11px">Show All</div>
  </div>
</div>

<div class="city-block">
  <div class="city-big">RPR</div>
  <div class="city-sub">Chhattisgarh · India</div>
</div>

<script>
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

// Zone definitions — center + radius (km) + status
const zones = [
  {id:'old-raipur',      name:'Old Raipur',      center:[81.628,21.236], r:0.9,  status:'active'},
  {id:'civil-lines',     name:'Civil Lines',      center:[81.623,21.256], r:0.8,  status:'active'},
  {id:'tatibandh',       name:'Tatibandh',        center:[81.612,21.236], r:0.85, status:'active'},
  {id:'telibandha',      name:'Telibandha',       center:[81.618,21.246], r:0.75, status:'active'},
  {id:'pandri',          name:'Pandri',           center:[81.657,21.239], r:0.8,  status:'active'},
  {id:'purani-basti',    name:'Purani Basti',     center:[81.636,21.242], r:0.6,  status:'active'},
  {id:'shankar-nagar',   name:'Shankar Nagar',    center:[81.661,21.254], r:0.75, status:'expanding'},
  {id:'avanti-vihar',    name:'Avanti Vihar',     center:[81.652,21.256], r:0.7,  status:'expanding'},
  {id:'fafadih',         name:'Fafadih',          center:[81.647,21.265], r:0.75, status:'expanding'},
  {id:'devendra-nagar',  name:'Devendra Nagar',   center:[81.612,21.256], r:0.7,  status:'expanding'},
  {id:'mowa',            name:'Mowa',             center:[81.634,21.276], r:0.9,  status:'soon'},
  {id:'tikrapara',       name:'Tikrapara',        center:[81.645,21.227], r:0.75, status:'soon'},
  {id:'pachpedi',        name:'Pachpedi Naka',    center:[81.625,21.227], r:0.65, status:'soon'},
  {id:'khamtarai',       name:'Khamtarai',        center:[81.668,21.249], r:0.8,  status:'soon'},
  {id:'gudhiyari',       name:'Gudhiyari',        center:[81.578,21.246], r:0.85, status:'soon'},
];

// Generate dense point cloud inside radius for each zone
// Points follow a gaussian distribution (dense center, fade to edges)
// This makes the heatmap look organic — not a perfect circle
function generatePoints(zone, n=120) {
  const [lng, lat] = zone.center;
  const r = zone.r / 111; // degrees approx
  const points = [];
  // Use gaussian-distributed points so center is denser
  for (let i = 0; i < n; i++) {
    // Box-Muller transform for gaussian distribution
    const u1 = Math.random(), u2 = Math.random();
    const mag = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    const mag2 = Math.sqrt(-2 * Math.log(u1)) * Math.sin(2 * Math.PI * u2);
    const dx = (mag * r * 0.45);
    const dy = (mag2 * r * 0.45);
    // Only keep points within 1.2x radius
    if (Math.sqrt(dx*dx + dy*dy) < r * 1.1) {
      points.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng + dx, lat + dy] },
        properties: { weight: Math.max(0.1, 1 - Math.sqrt(dx*dx+dy*dy)/(r*0.8)) }
      });
    }
  }
  return points;
}

// Split by status
const byStatus = { active: [], expanding: [], soon: [] };
zones.forEach(z => {
  generatePoints(z, z.status==='active' ? 150 : z.status==='expanding' ? 110 : 80)
    .forEach(pt => byStatus[z.status].push(pt));
});

const STATUS_COLORS = {
  active:    ['#001a0a','#00cc5a','#00e676','#69f0ae','#ffffff'],
  expanding: ['#1a0d00','#cc7a00','#ffab40','#ffd180','#ffffff'],
  soon:      ['#001020','#0077b6','#40c4ff','#80d8ff','#ffffff'],
};

function heatmapColorExpr(colors) {
  return [
    'interpolate', ['linear'], ['heatmap-density'],
    0,   'rgba(0,0,0,0)',
    0.1, colors[1] + '00',
    0.3, colors[1] + 'cc',
    0.5, colors[2],
    0.8, colors[3],
    1.0, colors[4]
  ];
}

mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [81.635, 21.250],
  zoom: 12.0,
  pitch: 40,
  bearing: -10,
  antialias: true
});

map.on('load', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);

  // Subtle 3D buildings — they show through the heatmap
  map.addLayer({
    id: 'buildings-3d', source: 'composite', 'source-layer': 'building',
    filter: ['==','extrude','true'], type: 'fill-extrusion', minzoom: 13,
    paint: {
      'fill-extrusion-color': '#0c1520',
      'fill-extrusion-height': ['get','height'],
      'fill-extrusion-base': ['get','min_height'],
      'fill-extrusion-opacity': 0.75
    }
  });

  // Add heatmap layer for each status
  ['active','expanding','soon'].forEach(status => {
    const colors = STATUS_COLORS[status];
    const pts = byStatus[status];

    map.addSource(`heat-${status}`, {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: pts }
    });

    map.addLayer({
      id: `heatmap-${status}`,
      type: 'heatmap',
      source: `heat-${status}`,
      paint: {
        // Weight each point by its density score
        'heatmap-weight': ['interpolate',['linear'],['get','weight'], 0,0, 1,1],

        // Intensity scales up slightly when zoomed in
        'heatmap-intensity': ['interpolate',['linear'],['zoom'],
          10, status==='active' ? 0.6 : status==='expanding' ? 0.5 : 0.35,
          14, status==='active' ? 1.2 : status==='expanding' ? 0.9 : 0.6,
          16, status==='active' ? 2.0 : status==='expanding' ? 1.5 : 1.0
        ],

        // Radius SHRINKS as you zoom in — at high zoom, hugs building footprints
        'heatmap-radius': ['interpolate',['linear'],['zoom'],
          10, 35,
          12, 50,
          14, 40,
          16, 20,
          18, 10
        ],

        // Color ramp — transparent core → vivid color → bright peak
        'heatmap-color': heatmapColorExpr(colors),

        // Overall opacity
        'heatmap-opacity': status==='active' ? 0.82 : status==='expanding' ? 0.7 : 0.5,
      }
    });
  });
});

let activeFilter = 'all';
function showOnly(status) {
  activeFilter = status;
  ['active','expanding','soon'].forEach(s => {
    const vis = (status === 'all' || s === status) ? 'visible' : 'none';
    if (map.getLayer(`heatmap-${s}`)) map.setLayoutProperty(`heatmap-${s}`, 'visibility', vis);
  });
}
</script>
</body>
</html>
