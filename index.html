  {id:"gudhiyari",name:"Gudhiyari",area:13,coverage:25,geojson:{"type":"Polygon","coordinates":[[[81.6214224,21.2602752],[81.6213008620241,21.261664385421334],[81.6209399409663,21.263011361146603],[81.62035060323028,21.2642752],[81.61955075554495,21.26541750087749],[81.6185647008775,21.26640355554495],[81.61742240000001,21.267203403230273],[81.6161585611466,21.267792740966286],[81.61481158542134,21.268153662024098],[81.6134224,21.268275199999998],[81.61203321457867,21.268153662024098],[81.6106862388534,21.267792740966286],[81.6094224,21.267203403230273],[81.60828009912251,21.26640355554495],[81.60729404445506,21.26541750087749],[81.60649419676973,21.2642752],[81.60590485903371,21.263011361146603],[81.60554393797591,21.261664385421334],[81.60542240000001,21.2602752],[81.60554393797591,21.258886014578664],[81.60590485903371,21.257539038853395],[81.60649419676973,21.256275199999997],[81.60729404445506,21.255132899122508],[81.60828009912251,21.254146844455047],[81.6094224,21.253346996769725],[81.6106862388534,21.252757659033712],[81.61203321457867,21.2523967379759],[81.6134224,21.2522752],[81.61481158542134,21.2523967379759],[81.6161585611466,21.252757659033712],[81.61742240000001,21.253346996769725],[81.6185647008775,21.254146844455047],[81.61955075554495,21.255132899122508],[81.62035060323028,21.256275199999997],[81.6209399409663,21.257539038853395],[81.6213008620241,21.258886014578664],[81.6214224,21.2602752]]]}},
];

let currentScheme='heat', maxOpacity=0.18, borderWidth=1.5, layerStates={coverage:true,'3d':true,labels:true};
const schemeStops={
  heat:[{v:0,r:26,g:35,b:126},{v:.3,r:0,g:188,b:212},{v:.6,r:76,g:175,b:80},{v:.8,r:255,g:235,b:59},{v:1,r:244,g:67,b:54}],
  cool:[{v:0,r:13,g:27,b:42},{v:.4,r:21,g:101,b:192},{v:.7,r:66,g:165,b:245},{v:1,r:179,g:229,b:252}],
  neon:[{v:0,r:5,g:10,b:5},{v:.25,r:0,g:80,b:0},{v:1,r:57,g:255,b:20}],
  ember:[{v:0,r:26,g:10,b:0},{v:.4,r:191,g:54,b:12},{v:.7,r:255,g:111,b:0},{v:1,r:255,g:213,b:79}]
};
function lerpColor(val,stops){const v=Math.max(0,Math.min(1,val/100));let lo=stops[0],hi=stops[stops.length-1];for(let i=0;i<stops.length-1;i++){if(v>=stops[i].v&&v<=stops[i+1].v){lo=stops[i];hi=stops[i+1];break;}}const t=hi.v===lo.v?0:(v-lo.v)/(hi.v-lo.v);return`rgb(${Math.round(lo.r+(hi.r-lo.r)*t)},${Math.round(lo.g+(hi.g-lo.g)*t)},${Math.round(lo.b+(hi.b-lo.b)*t)})`;}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function getZoneColor(z){if(currentScheme==='solid'){const b=hexToRgb(document.getElementById('base-color').value),h=hexToRgb(document.getElementById('high-color').value),t=z.coverage/100;return`rgb(${Math.round(b.r+(h.r-b.r)*t)},${Math.round(b.g+(h.g-b.g)*t)},${Math.round(b.b+(h.b-b.b)*t)})`;}return lerpColor(z.coverage,schemeStops[currentScheme]);}
// Subtle fill: low base opacity, scales gently with coverage
function getFillOpacity(z){return maxOpacity * (0.4 + 0.6 * z.coverage/100);}
// Border is the hero — brighter and more visible
function getBorderOpacity(z){return 0.4 + 0.5 * z.coverage/100;}

mapboxgl.accessToken=TOKEN;
const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[81.635,21.252],zoom:12.2,pitch:45,bearing:-12,antialias:true});
const popup=new mapboxgl.Popup({closeButton:false,closeOnClick:false});

map.on('load',()=>{
  setTimeout(()=>document.getElementById('loader').classList.add('hidden'),400);

  map.addLayer({id:'buildings-3d',source:'composite','source-layer':'building',filter:['==','extrude','true'],type:'fill-extrusion',minzoom:12,paint:{'fill-extrusion-color':'#141d2e','fill-extrusion-height':['get','height'],'fill-extrusion-base':['get','min_height'],'fill-extrusion-opacity':.85}});

  zones.forEach(z=>{
    map.addSource(z.id,{type:'geojson',data:{type:'Feature',properties:{},geometry:z.geojson}});

    // Very subtle fill — just a tint, map shows through
    map.addLayer({id:`fill-${z.id}`,type:'fill',source:z.id,paint:{
      'fill-color':getZoneColor(z),
      'fill-opacity': getFillOpacity(z)
    }});

    // Strong border — this is what defines the zone
    map.addLayer({id:`line-${z.id}`,type:'line',source:z.id,paint:{
      'line-color':getZoneColor(z),
      'line-opacity': getBorderOpacity(z),
      'line-width': borderWidth,
      'line-blur': 0.5
    }});

    map.on('mouseenter',`fill-${z.id}`,(e)=>{
      map.getCanvas().style.cursor='pointer';
      // Boost fill on hover
      map.setPaintProperty(`fill-${z.id}`,'fill-opacity', Math.min(0.5, getFillOpacity(z)*2.5));
      popup.setLngLat(e.lngLat).setHTML(`<div style="font-family:'Syne',sans-serif;background:rgba(7,9,16,0.96);border:1px solid rgba(79,195,247,0.25);padding:12px 16px;border-radius:4px;min-width:160px;"><div style="font-weight:800;font-size:14px;color:#fff;margin-bottom:6px;">${z.name}</div><div style="font-family:'Space Mono',monospace;font-size:10px;color:#4fc3f7;">Coverage: <b>${z.coverage}%</b></div><div style="font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;">~${z.area} km² total</div><div style="margin-top:8px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;"><div style="height:100%;width:${z.coverage}%;background:${getZoneColor(z)};border-radius:2px;"></div></div></div>`).addTo(map);
    });
    map.on('mouseleave',`fill-${z.id}`,()=>{
      map.getCanvas().style.cursor='';
      map.setPaintProperty(`fill-${z.id}`,'fill-opacity', getFillOpacity(z));
      popup.remove();
    });
  });

  buildZonesList();updateStats();
});

function buildZonesList(){document.getElementById('zones-list').innerHTML=zones.map(z=>`<div class="zone-item"><div class="zone-top"><div class="zone-name">${z.name}</div><div class="zone-badge" id="badge-${z.id}" style="background:${getZoneColor(z)}20;color:${getZoneColor(z)};">${z.coverage}%</div></div><input type="range" class="zone-slider" min="0" max="100" value="${z.coverage}" oninput="updateZone('${z.id}',+this.value)"></div>`).join('');}

function updateZone(id,val){const z=zones.find(z=>z.id===id);z.coverage=val;const c=getZoneColor(z);const b=document.getElementById(`badge-${id}`);if(b){b.textContent=val+'%';b.style.background=c+'20';b.style.color=c;}if(map.getLayer(`fill-${id}`)){map.setPaintProperty(`fill-${id}`,'fill-color',c);map.setPaintProperty(`fill-${id}`,'fill-opacity',getFillOpacity(z));map.setPaintProperty(`line-${id}`,'line-color',c);map.setPaintProperty(`line-${id}`,'line-opacity',getBorderOpacity(z));}updateStats();}

function setScheme(s){currentScheme=s;document.querySelectorAll('.scheme-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`s-${s}`).classList.add('active');refreshAll();}
function updateCustomColor(){document.getElementById('solid-preview').style.background=`linear-gradient(90deg,#111,${document.getElementById('base-color').value})`;refreshAll();}
function updateOpacity(v){maxOpacity=v/100;document.getElementById('opacity-val').textContent=v+'%';refreshAll();}
function updateBorder(v){borderWidth=parseFloat(v);document.getElementById('border-val').textContent=v+'px';zones.forEach(z=>{if(map.getLayer(`line-${z.id}`))map.setPaintProperty(`line-${z.id}`,'line-width',borderWidth);});}

function refreshAll(){zones.forEach(z=>{const c=getZoneColor(z);const b=document.getElementById(`badge-${z.id}`);if(b){b.style.background=c+'20';b.style.color=c;}if(map.getLayer(`fill-${z.id}`)){map.setPaintProperty(`fill-${z.id}`,'fill-color',c);map.setPaintProperty(`fill-${z.id}`,'fill-opacity',getFillOpacity(z));map.setPaintProperty(`line-${z.id}`,'line-color',c);map.setPaintProperty(`line-${z.id}`,'line-opacity',getBorderOpacity(z));}});}

function toggleLayer(l){layerStates[l]=!layerStates[l];document.getElementById(`t-${l}`).classList.toggle('on',layerStates[l]);const v=layerStates[l]?'visible':'none';if(l==='coverage')zones.forEach(z=>{if(map.getLayer(`fill-${z.id}`))map.setLayoutProperty(`fill-${z.id}`,'visibility',v);if(map.getLayer(`line-${z.id}`))map.setLayoutProperty(`line-${z.id}`,'visibility',v);});if(l==='3d'){if(map.getLayer('buildings-3d'))map.setLayoutProperty('buildings-3d','visibility',v);map.easeTo({pitch:layerStates['3d']?45:0,duration:600});}if(l==='labels'){['country-label','state-label','settlement-label','poi-label','road-label'].forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility',v);});}}

function updateStats(){const avg=Math.round(zones.reduce((s,z)=>s+z.coverage,0)/zones.length);const a=Math.round(zones.reduce((s,z)=>s+z.area*(z.coverage/100),0));document.getElementById('s-avg').textContent=avg+'%';document.getElementById('s-area').textContent=a;}
</script>
