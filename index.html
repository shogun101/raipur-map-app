<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage — Pitch Map</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --green: #00e676;
  --amber: #ffab40;
  --blue: #40c4ff;
  --bg: #060810;
  --panel: rgba(6,8,16,0.92);
  --border: rgba(255,255,255,0.06);
  --text: #f0f4f8;
  --muted: rgba(240,244,248,0.35);
}
body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); height: 100vh; overflow: hidden; }

/* ── MAP ── */
#map { position: absolute; inset: 0; }
.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
.mapboxgl-popup-content { background: transparent !important; padding: 0 !important; border: none !important; box-shadow: none !important; }

/* ── TOP BAR ── */
.topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px;
  background: linear-gradient(180deg, rgba(6,8,16,0.95) 0%, transparent 100%);
  pointer-events: none;
}
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-name { font-weight: 800; font-size: 22px; letter-spacing: -0.5px; color: #fff; }
.brand-name span { color: var(--green); }
.brand-tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

/* ── STAT CARDS TOP RIGHT ── */
.stats-row {
  position: absolute; top: 18px; right: 28px; z-index: 20;
  display: flex; gap: 10px;
}
.stat-card {
  background: rgba(6,8,16,0.88); border: 1px solid var(--border);
  backdrop-filter: blur(16px); padding: 12px 18px; min-width: 100px;
  text-align: center; border-top: 2px solid transparent;
}
.stat-card.green { border-top-color: var(--green); }
.stat-card.amber { border-top-color: var(--amber); }
.stat-card.blue { border-top-color: var(--blue); }
.stat-num { font-weight: 800; font-size: 26px; color: #fff; line-height: 1; letter-spacing: -1px; }
.stat-num.green { color: var(--green); }
.stat-num.amber { color: var(--amber); }
.stat-num.blue { color: var(--blue); }
.stat-desc { font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

/* ── LEGEND BOTTOM LEFT ── */
.legend {
  position: absolute; bottom: 32px; left: 28px; z-index: 20;
  background: rgba(6,8,16,0.88); border: 1px solid var(--border);
  backdrop-filter: blur(16px); padding: 14px 18px;
}
.legend-title { font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; transition: opacity 0.2s; }
.legend-item:last-child { margin-bottom: 0; }
.legend-item:hover { opacity: 0.7; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-item-label { font-size: 12px; font-weight: 600; color: var(--text); }
.legend-item-count { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); margin-left: auto; padding-left: 16px; }

/* ── BOTTOM RIGHT — CITY INFO ── */
.city-block {
  position: absolute; bottom: 32px; right: 28px; z-index: 20;
  text-align: right;
}
.city-big { font-weight: 800; font-size: 52px; letter-spacing: -3px; color: rgba(255,255,255,0.07); line-height: 1; user-select: none; }
.city-sub { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: -4px; }

/* ── ZONE FILTER TABS ── */
.filter-tabs {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  z-index: 20; display: flex; gap: 4px;
}
.tab-btn {
  background: rgba(6,8,16,0.88); border: 1px solid var(--border);
  backdrop-filter: blur(16px); color: var(--muted);
  font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px;
  padding: 9px 16px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 7px;
}
.tab-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
.tab-btn.active { color: #fff; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
.tab-btn:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

/* ── LOADER ── */
#loader { position:fixed; inset:0; background:#060810; display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:18px; transition:opacity 0.6s; }
#loader.hidden { opacity:0; pointer-events:none; }
.loader-logo { font-weight:800; font-size:36px; letter-spacing:-1.5px; color:#fff; }
.loader-logo span { color: var(--green); }
.loader-bar { width:160px; height:2px; background:rgba(0,230,118,0.15); border-radius:1px; overflow:hidden; }
.loader-bar::after { content:''; display:block; height:100%; background:var(--green); animation:load 1.2s ease-in-out infinite; }
@keyframes load { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.loader-sub { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,230,118,0.4); text-transform:uppercase; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Rai<span>pur</span></div>
  <div class="loader-bar"></div>
  <div class="loader-sub">Loading coverage data...</div>
</div>

<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-name">Delivery<span>OS</span></div>
    <div class="brand-tag">Raipur · Market Coverage</div>
  </div>
</div>

<!-- STAT CARDS -->
<div class="stats-row">
  <div class="stat-card green">
    <div class="stat-num green" id="stat-active">—</div>
    <div class="stat-desc">Active Zones</div>
  </div>
  <div class="stat-card amber">
    <div class="stat-num amber" id="stat-expanding">—</div>
    <div class="stat-desc">Expanding</div>
  </div>
  <div class="stat-card blue">
    <div class="stat-num blue" id="stat-coverage">—</div>
    <div class="stat-desc">Area Covered</div>
  </div>
  <div class="stat-card" style="border-top-color:rgba(255,255,255,0.2)">
    <div class="stat-num" id="stat-pop">1.2M</div>
    <div class="stat-desc">Addressable Pop.</div>
  </div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-title">Zone Status</div>
  <div class="legend-item" onclick="filterZones('active')">
    <div class="legend-dot" style="background:var(--green)"></div>
    <div class="legend-item-label">Active</div>
    <div class="legend-item-count" id="lc-active">—</div>
  </div>
  <div class="legend-item" onclick="filterZones('expanding')">
    <div class="legend-dot" style="background:var(--amber)"></div>
    <div class="legend-item-label">Expanding</div>
    <div class="legend-item-count" id="lc-expanding">—</div>
  </div>
  <div class="legend-item" onclick="filterZones('soon')">
    <div class="legend-dot" style="background:var(--blue); opacity:0.5"></div>
    <div class="legend-item-label">Coming Soon</div>
    <div class="legend-item-count" id="lc-soon">—</div>
  </div>
  <div class="legend-item" onclick="filterZones('all')" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
    <div class="legend-dot" style="background:rgba(255,255,255,0.2)"></div>
    <div class="legend-item-label" style="color:var(--muted);font-size:11px;">Show All</div>
  </div>
</div>

<!-- CITY WATERMARK -->
<div class="city-block">
  <div class="city-big">RPR</div>
  <div class="city-sub">Chhattisgarh · India</div>
</div>

<script>
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

// Zone data with real OSM polygons + status
const zones = [
  {id:"shankar-nagar",name:"Shankar Nagar",area:12,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.6605267,21.2485818],[81.6609604,21.2481342],[81.6612733,21.248371],[81.6608396,21.2488186],[81.6605267,21.2485818]]]}},
  {id:"telibandha",name:"Telibandha",area:16,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.6374,21.244],[81.651,21.244],[81.651,21.254],[81.6374,21.254],[81.6374,21.244]]]}},
  {id:"pandri",name:"Pandri",area:13,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.652,21.232],[81.664,21.232],[81.664,21.246],[81.652,21.246],[81.652,21.232]]]}},
  {id:"mowa",name:"Mowa",area:17,status:"expanding",geojson:{"type":"Polygon","coordinates":[[[81.624,21.268],[81.644,21.268],[81.644,21.284],[81.624,21.284],[81.624,21.268]]]}},
  {id:"khamtarai",name:"Khamtarai",area:11,status:"soon",geojson:{"type":"Polygon","coordinates":[[[81.658,21.24],[81.676,21.24],[81.676,21.258],[81.658,21.258],[81.658,21.24]]]}},
  {id:"old-raipur",name:"Old Raipur",area:18,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.618,21.228],[81.638,21.228],[81.638,21.244],[81.618,21.244],[81.618,21.228]]]}},
  {id:"civil-lines",name:"Civil Lines",area:14,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.615,21.248],[81.635,21.248],[81.635,21.264],[81.615,21.264],[81.615,21.248]]]}},
  {id:"avanti-vihar",name:"Avanti Vihar",area:11,status:"expanding",geojson:{"type":"Polygon","coordinates":[[[81.644,21.248],[81.662,21.248],[81.662,21.264],[81.644,21.264],[81.644,21.248]]]}},
  {id:"tatibandh",name:"Tatibandh",area:15,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.604,21.228],[81.622,21.228],[81.622,21.244],[81.604,21.244],[81.604,21.228]]]}},
  {id:"fafadih",name:"Fafadih",area:14,status:"expanding",geojson:{"type":"Polygon","coordinates":[[[81.638,21.258],[81.656,21.258],[81.656,21.274],[81.638,21.274],[81.638,21.258]]]}},
  {id:"tikrapara",name:"Tikrapara",area:12,status:"soon",geojson:{"type":"Polygon","coordinates":[[[81.636,21.218],[81.654,21.218],[81.654,21.234],[81.636,21.234],[81.636,21.218]]]}},
  {id:"pachpedi",name:"Pachpedi Naka",area:10,status:"soon",geojson:{"type":"Polygon","coordinates":[[[81.616,21.218],[81.634,21.218],[81.634,21.234],[81.616,21.234],[81.616,21.218]]]}},
  {id:"devendra-nagar",name:"Devendra Nagar",area:11,status:"expanding",geojson:{"type":"Polygon","coordinates":[[[81.604,21.248],[81.622,21.248],[81.622,21.264],[81.604,21.264],[81.604,21.248]]]}},
  {id:"gudhiyari",name:"Gudhiyari",area:13,status:"soon",geojson:{"type":"Polygon","coordinates":[[[81.568,21.238],[81.588,21.238],[81.588,21.254],[81.568,21.254],[81.568,21.238]]]}},
  {id:"purani-basti",name:"Purani Basti",area:9,status:"active",geojson:{"type":"Polygon","coordinates":[[[81.628,21.236],[81.644,21.236],[81.644,21.248],[81.628,21.248],[81.628,21.236]]]}},
];

const STATUS_COLORS = { active: '#00e676', expanding: '#ffab40', soon: '#40c4ff' };
const STATUS_FILL_OPACITY = { active: 0.18, expanding: 0.12, soon: 0.07 };
const STATUS_LINE_OPACITY = { active: 0.85, expanding: 0.65, soon: 0.4 };
const STATUS_LINE_WIDTH = { active: 1.8, expanding: 1.4, soon: 1.0 };

mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [81.635, 21.250],
  zoom: 12.0, pitch: 40, bearing: -10, antialias: true
});

const popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false, offset: 12 });

map.on('load', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);

  // Subtle 3D buildings
  map.addLayer({
    id: 'buildings-3d', source: 'composite', 'source-layer': 'building',
    filter: ['==','extrude','true'], type: 'fill-extrusion', minzoom: 13,
    paint: { 'fill-extrusion-color': '#0d1520', 'fill-extrusion-height': ['get','height'], 'fill-extrusion-base': ['get','min_height'], 'fill-extrusion-opacity': 0.7 }
  });

  zones.forEach(z => {
    const color = STATUS_COLORS[z.status];
    map.addSource(z.id, { type: 'geojson', data: { type: 'Feature', properties: {}, geometry: z.geojson } });

    map.addLayer({ id: `fill-${z.id}`, type: 'fill', source: z.id, paint: {
      'fill-color': color,
      'fill-opacity': STATUS_FILL_OPACITY[z.status]
    }});

    map.addLayer({ id: `line-${z.id}`, type: 'line', source: z.id, paint: {
      'line-color': color,
      'line-opacity': STATUS_LINE_OPACITY[z.status],
      'line-width': STATUS_LINE_WIDTH[z.status],
      'line-blur': 0.3
    }});

    map.on('mouseenter', `fill-${z.id}`, (e) => {
      map.getCanvas().style.cursor = 'pointer';
      map.setPaintProperty(`fill-${z.id}`, 'fill-opacity', Math.min(0.4, STATUS_FILL_OPACITY[z.status] * 2.5));
      const statusLabel = z.status === 'active' ? '🟢 Active' : z.status === 'expanding' ? '🟡 Expanding' : '🔵 Coming Soon';
      popup.setLngLat(e.lngLat).setHTML(`
        <div style="font-family:'Syne',sans-serif;background:rgba(6,8,16,0.97);border:1px solid ${color}33;border-top:2px solid ${color};padding:14px 18px;min-width:170px;">
          <div style="font-weight:800;font-size:15px;color:#fff;margin-bottom:4px;">${z.name}</div>
          <div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:${color};text-transform:uppercase;margin-bottom:10px;">${statusLabel}</div>
          <div style="font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.45);">~${z.area} km² service area</div>
        </div>`).addTo(map);
    });
    map.on('mouseleave', `fill-${z.id}`, () => {
      map.getCanvas().style.cursor = '';
      map.setPaintProperty(`fill-${z.id}`, 'fill-opacity', STATUS_FILL_OPACITY[z.status]);
      popup.remove();
    });
  });

  updateStats();
});

function updateStats() {
  const active = zones.filter(z => z.status === 'active');
  const expanding = zones.filter(z => z.status === 'expanding');
  const soon = zones.filter(z => z.status === 'soon');
  const coveredArea = [...active, ...expanding].reduce((s, z) => s + z.area, 0);

  document.getElementById('stat-active').textContent = active.length;
  document.getElementById('stat-expanding').textContent = expanding.length;
  document.getElementById('stat-coverage').textContent = coveredArea + ' km²';
  document.getElementById('lc-active').textContent = active.length + ' zones';
  document.getElementById('lc-expanding').textContent = expanding.length + ' zones';
  document.getElementById('lc-soon').textContent = soon.length + ' zones';
}

function filterZones(status) {
  zones.forEach(z => {
    const vis = (status === 'all' || z.status === status) ? 'visible' : 'none';
    if (map.getLayer(`fill-${z.id}`)) map.setLayoutProperty(`fill-${z.id}`, 'visibility', vis);
    if (map.getLayer(`line-${z.id}`)) map.setLayoutProperty(`line-${z.id}`, 'visibility', vis);
  });
}
</script>
</body>
</html>
