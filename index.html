<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060810; font-family:'Syne',sans-serif; color:#f0f4f8; height:100vh; overflow:hidden; }
#map { position:absolute; inset:0; }
.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib { display:none !important; }
.mapboxgl-popup-content { background:transparent !important; padding:0 !important; border:none !important; box-shadow:none !important; }

.topbar {
  position:absolute; top:0; left:0; right:0; z-index:20; pointer-events:none;
  padding:20px 28px;
  background:linear-gradient(180deg,rgba(6,8,16,0.92) 0%,transparent 100%);
}
.brand-name { font-weight:800; font-size:22px; letter-spacing:-0.5px; color:#fff; }
.brand-name span { color:#00e676; }
.brand-tag { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-top:3px; }

.stats-row { position:absolute; top:18px; right:28px; z-index:20; display:flex; gap:8px; align-items:flex-start; }
.stat-card {
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); padding:12px 18px; text-align:center; border-top:2px solid;
  opacity:0; transform:translateY(-8px); transition:opacity 0.5s, transform 0.5s;
}
.stat-card.visible { opacity:1; transform:translateY(0); }
.stat-num { font-weight:800; font-size:26px; line-height:1; letter-spacing:-1px; }
.stat-desc { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1.5px; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-top:4px; }

/* Action buttons — top right below stat cards */
.action-btns {
  position:absolute; top:110px; right:28px; z-index:20;
  display:flex; flex-direction:column; gap:6px;
  opacity:0; transform:translateY(-6px); transition:opacity 0.5s 0.5s, transform 0.5s 0.5s;
}
.action-btns.visible { opacity:1; transform:translateY(0); }
.act-btn {
  display:flex; align-items:center; gap:8px;
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px); color:rgba(255,255,255,0.6);
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1.5px;
  padding:9px 14px; text-transform:uppercase; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.act-btn:hover { border-color:rgba(255,255,255,0.2); color:#fff; }
.act-btn.active-state { border-color:#00e676; color:#00e676; background:rgba(0,230,118,0.06); }
.act-btn svg { flex-shrink:0; }

.legend {
  position:absolute; bottom:32px; left:28px; z-index:20;
  background:rgba(6,8,16,0.88); border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); padding:16px 20px;
  opacity:0; transform:translateX(-8px); transition:opacity 0.5s 0.3s, transform 0.5s 0.3s;
}
.legend.visible { opacity:1; transform:translateX(0); }
.legend-title { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:12px; }
.legend-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; transition:opacity 0.2s; }
.legend-item:last-child { margin-bottom:0; }
.legend-item:hover { opacity:0.7; }
.l-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.l-label { font-size:12px; font-weight:600; }
.l-count { font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,0.3); margin-left:auto; padding-left:20px; }

.city-block { position:absolute; bottom:32px; right:28px; z-index:20; text-align:right; pointer-events:none; }
.city-big { font-weight:800; font-size:72px; letter-spacing:-5px; color:rgba(255,255,255,0.03); line-height:1; }
.city-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:3px; color:rgba(255,255,255,0.15); text-transform:uppercase; }

.zoom-hint {
  position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
  z-index:20; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
  color:rgba(255,255,255,0.3); text-transform:uppercase;
  background:rgba(6,8,16,0.7); border:1px solid rgba(255,255,255,0.06);
  padding:7px 14px; backdrop-filter:blur(12px); pointer-events:none;
  transition:opacity 0.4s;
}

/* Download flash feedback */
.dl-flash {
  position:absolute; bottom:90px; right:28px; z-index:30;
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1.5px;
  color:#00e676; text-transform:uppercase; padding:8px 14px;
  background:rgba(0,230,118,0.08); border:1px solid rgba(0,230,118,0.3);
  opacity:0; transition:opacity 0.3s; pointer-events:none;
}
.dl-flash.show { opacity:1; }

#loader { position:fixed; inset:0; background:#060810; display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:16px; transition:opacity 0.8s; }
#loader.hidden { opacity:0; pointer-events:none; }
.l-logo { font-weight:800; font-size:34px; letter-spacing:-1px; color:#fff; }
.l-logo span { color:#00e676; }
.l-bar { width:140px; height:2px; background:rgba(0,230,118,0.1); overflow:hidden; }
.l-bar::after { content:''; display:block; height:100%; background:#00e676; animation:ld 1.2s ease-in-out infinite; }
@keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.l-sub { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,230,118,0.3); text-transform:uppercase; }
</style>
</head>
<body>

<div id="loader">
  <div class="l-logo">Rai<span>pur</span></div>
  <div class="l-bar"></div>
  <div class="l-sub">Mapping coverage...</div>
</div>

<div id="map"></div>

<div class="topbar">
  <div class="brand-name">Delivery<span>OS</span></div>
  <div class="brand-tag">Raipur · Market Coverage</div>
</div>

<div class="stats-row">
  <div class="stat-card" style="border-top-color:#00e676" id="sc1">
    <div class="stat-num" style="color:#00e676">6</div>
    <div class="stat-desc">Active Zones</div>
  </div>
  <div class="stat-card" style="border-top-color:#ffab40" id="sc2">
    <div class="stat-num" style="color:#ffab40">4</div>
    <div class="stat-desc">Expanding</div>
  </div>
  <div class="stat-card" style="border-top-color:#40c4ff" id="sc3">
    <div class="stat-num" style="color:#40c4ff">5</div>
    <div class="stat-desc">Coming Soon</div>
  </div>
  <div class="stat-card" style="border-top-color:rgba(255,255,255,0.15)" id="sc4">
    <div class="stat-num" style="color:#fff">1.2M</div>
    <div class="stat-desc">Addressable Pop.</div>
  </div>
</div>

<!-- Action buttons -->
<div class="action-btns" id="action-btns">
  <button class="act-btn active-state" id="toggle-btn" onclick="toggleEffects()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Effects On
  </button>
  <button class="act-btn" onclick="downloadPNG()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PNG
  </button>
</div>

<div class="legend" id="legend">
  <div class="legend-title">Zone Status</div>
  <div class="legend-item" onclick="filterTo('active')">
    <div class="l-dot" style="background:#00e676;box-shadow:0 0 5px #00e676"></div>
    <div class="l-label">Active</div><div class="l-count">6 zones</div>
  </div>
  <div class="legend-item" onclick="filterTo('expanding')">
    <div class="l-dot" style="background:#ffab40;box-shadow:0 0 5px #ffab40"></div>
    <div class="l-label">Expanding</div><div class="l-count">4 zones</div>
  </div>
  <div class="legend-item" onclick="filterTo('soon')">
    <div class="l-dot" style="background:#40c4ff;box-shadow:0 0 5px #40c4ff;opacity:0.6"></div>
    <div class="l-label">Coming Soon</div><div class="l-count">5 zones</div>
  </div>
  <div class="legend-item" onclick="filterTo('all')" style="margin-top:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)">
    <div class="l-dot" style="background:rgba(255,255,255,0.2)"></div>
    <div class="l-label" style="color:rgba(255,255,255,0.35);font-size:11px">Show All</div>
  </div>
</div>

<div class="city-block">
  <div class="city-big">RPR</div>
  <div class="city-sub">Chhattisgarh · India</div>
</div>

<div class="zoom-hint" id="zoom-hint">Zoom in to see building-level coverage</div>
<div class="dl-flash" id="dl-flash">✓ Saved to Downloads</div>

<script>
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

const zones = [
  { id:'old-raipur',     name:'Old Raipur',      status:'active',
    poly:[[81.616,21.226],[81.640,21.226],[81.640,21.244],[81.616,21.244],[81.616,21.226]] },
  { id:'purani-basti',   name:'Purani Basti',     status:'active',
    poly:[[81.629,21.234],[81.646,21.234],[81.646,21.248],[81.629,21.248],[81.629,21.234]] },
  { id:'tatibandh',      name:'Tatibandh',        status:'active',
    poly:[[81.597,21.226],[81.618,21.226],[81.618,21.244],[81.597,21.244],[81.597,21.226]] },
  { id:'telibandha',     name:'Telibandha',       status:'active',
    poly:[[81.604,21.238],[81.626,21.238],[81.626,21.256],[81.604,21.256],[81.604,21.238]] },
  { id:'civil-lines',    name:'Civil Lines',      status:'active',
    poly:[[81.609,21.248],[81.632,21.248],[81.632,21.267],[81.609,21.267],[81.609,21.248]] },
  { id:'pandri',         name:'Pandri',           status:'active',
    poly:[[81.648,21.229],[81.669,21.229],[81.669,21.247],[81.648,21.247],[81.648,21.229]] },
  { id:'shankar-nagar',  name:'Shankar Nagar',    status:'expanding',
    poly:[[81.652,21.248],[81.674,21.248],[81.674,21.265],[81.652,21.265],[81.652,21.248]] },
  { id:'avanti-vihar',   name:'Avanti Vihar',     status:'expanding',
    poly:[[81.641,21.252],[81.659,21.252],[81.659,21.268],[81.641,21.268],[81.641,21.252]] },
  { id:'devendra-nagar', name:'Devendra Nagar',   status:'expanding',
    poly:[[81.596,21.248],[81.614,21.248],[81.614,21.266],[81.596,21.266],[81.596,21.248]] },
  { id:'fafadih',        name:'Fafadih',          status:'expanding',
    poly:[[81.635,21.258],[81.656,21.258],[81.656,21.275],[81.635,21.275],[81.635,21.258]] },
  { id:'mowa',           name:'Mowa',             status:'soon',
    poly:[[81.620,21.268],[81.646,21.268],[81.646,21.286],[81.620,21.286],[81.620,21.268]] },
  { id:'tikrapara',      name:'Tikrapara',        status:'soon',
    poly:[[81.637,21.216],[81.657,21.216],[81.657,21.231],[81.637,21.231],[81.637,21.216]] },
  { id:'pachpedi',       name:'Pachpedi Naka',    status:'soon',
    poly:[[81.614,21.216],[81.634,21.216],[81.634,21.231],[81.614,21.231],[81.614,21.216]] },
  { id:'khamtarai',      name:'Khamtarai',        status:'soon',
    poly:[[81.657,21.239],[81.679,21.239],[81.679,21.257],[81.657,21.257],[81.657,21.239]] },
  { id:'gudhiyari',      name:'Gudhiyari',        status:'soon',
    poly:[[81.558,21.237],[81.580,21.237],[81.580,21.254],[81.558,21.254],[81.558,21.237]] },
];

const COLOR = { active:'#00e676', expanding:'#ffab40', soon:'#40c4ff' };
let effectsOn = true;
const allLayerIds = [];

mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [81.635, 21.250],
  zoom: 10.8, pitch: 0, bearing: 0, antialias: true,
  preserveDrawingBuffer: true  // ← required for PNG export
});

const popup = new mapboxgl.Popup({ closeButton:false, closeOnClick:false, offset:12 });

map.on('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    ['sc1','sc2','sc3','sc4'].forEach((id,i) => {
      setTimeout(() => document.getElementById(id).classList.add('visible'), i*100);
    });
    setTimeout(() => {
      document.getElementById('legend').classList.add('visible');
      document.getElementById('action-btns').classList.add('visible');
    }, 400);

    // Cinematic zoom after 2s
    setTimeout(() => {
      map.flyTo({
        center: [81.628, 21.244], zoom: 14.2, pitch: 48, bearing: -16,
        duration: 3800, easing: t => t<0.5 ? 2*t*t : -1+(4-2*t)*t
      });
      setTimeout(() => { document.getElementById('zoom-hint').style.opacity='0'; }, 2000);
    }, 2000);
  }, 600);

  // Dark base buildings
  map.addLayer({
    id:'base-buildings', source:'composite', 'source-layer':'building',
    filter:['==','extrude','true'], type:'fill-extrusion', minzoom:12,
    paint:{
      'fill-extrusion-color':'#0a1220',
      'fill-extrusion-height':['get','height'],
      'fill-extrusion-base':['get','min_height'],
      'fill-extrusion-opacity':0.85
    }
  });

  zones.forEach(z => {
    const color = COLOR[z.status];
    const geom = { type:'Polygon', coordinates:[[...z.poly, z.poly[0]]] };
    const feature = { type:'Feature', geometry:geom, properties:{} };
    map.addSource(`src-${z.id}`, { type:'geojson', data:feature });

    // Area ghost fill
    map.addLayer({ id:`area-${z.id}`, type:'fill', source:`src-${z.id}`, paint:{
      'fill-color':color,
      'fill-opacity':['interpolate',['linear'],['zoom'],
        10, z.status==='active'?0.10:z.status==='expanding'?0.07:0.04,
        13, 0.02, 15, 0.01]
    }});
    allLayerIds.push(`area-${z.id}`);

    // Zone border glow
    map.addLayer({ id:`border-${z.id}`, type:'line', source:`src-${z.id}`, paint:{
      'line-color':color,
      'line-opacity':z.status==='active'?0.7:z.status==='expanding'?0.5:0.3,
      'line-width':['interpolate',['linear'],['zoom'],10,1.5,13,2,15,1.5],
      'line-blur':1
    }});
    allLayerIds.push(`border-${z.id}`);

    // Building footprints
    map.addLayer({ id:`bldg-${z.id}`, type:'fill', source:'composite', 'source-layer':'building',
      filter:['within', feature], minzoom:12, paint:{
        'fill-color':color,
        'fill-opacity':['interpolate',['linear'],['zoom'],
          12,0, 13,z.status==='active'?0.45:z.status==='expanding'?0.30:0.18,
          16,z.status==='active'?0.65:z.status==='expanding'?0.45:0.28]
      }
    });
    allLayerIds.push(`bldg-${z.id}`);

    // 3D buildings glow
    map.addLayer({ id:`bldg3d-${z.id}`, type:'fill-extrusion', source:'composite', 'source-layer':'building',
      filter:['all',['==','extrude','true'],['within',feature]], minzoom:13, paint:{
        'fill-extrusion-color':color,
        'fill-extrusion-height':['get','height'],
        'fill-extrusion-base':['get','min_height'],
        'fill-extrusion-opacity':['interpolate',['linear'],['zoom'],
          13,0, 13.5,z.status==='active'?0.55:z.status==='expanding'?0.38:0.22,
          16,z.status==='active'?0.80:z.status==='expanding'?0.55:0.35]
      }
    });
    allLayerIds.push(`bldg3d-${z.id}`);

    // Roads glow
    map.addLayer({ id:`roads-${z.id}`, type:'line', source:'composite', 'source-layer':'road',
      filter:['within',feature], minzoom:12, paint:{
        'line-color':color,
        'line-opacity':['interpolate',['linear'],['zoom'],
          12,0, 13,z.status==='active'?0.30:z.status==='expanding'?0.20:0.12,
          15,z.status==='active'?0.45:z.status==='expanding'?0.30:0.18],
        'line-width':['interpolate',['linear'],['zoom'],12,1,14,2.5,17,5],
        'line-blur':1.5
      }
    });
    allLayerIds.push(`roads-${z.id}`);

    // Hover popup
    ['area','bldg'].forEach(prefix => {
      map.on('mouseenter',`${prefix}-${z.id}`,(e) => {
        map.getCanvas().style.cursor='pointer';
        const labels={active:'🟢 Active',expanding:'🟡 Expanding',soon:'🔵 Coming Soon'};
        popup.setLngLat(e.lngLat).setHTML(`
          <div style="font-family:'Syne',sans-serif;background:rgba(6,8,16,0.97);border:1px solid ${color}44;border-top:2px solid ${color};padding:14px 18px;min-width:160px;">
            <div style="font-weight:800;font-size:15px;color:#fff;margin-bottom:5px;">${z.name}</div>
            <div style="font-family:'Space Mono',monospace;font-size:9px;color:${color};letter-spacing:1px;text-transform:uppercase;">${labels[z.status]}</div>
          </div>`).addTo(map);
      });
      map.on('mouseleave',`${prefix}-${z.id}`,()=>{map.getCanvas().style.cursor='';popup.remove();});
    });
  });

  map.on('zoom', () => {
    document.getElementById('zoom-hint').style.opacity = map.getZoom()<12.5?'1':'0';
  });
});

// ── TOGGLE EFFECTS ──────────────────────────────────────────────────────────
function toggleEffects() {
  effectsOn = !effectsOn;
  const vis = effectsOn ? 'visible' : 'none';
  allLayerIds.forEach(id => {
    if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
  });
  const btn = document.getElementById('toggle-btn');
  if (effectsOn) {
    btn.classList.add('active-state');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg> Effects On`;
  } else {
    btn.classList.remove('active-state');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Effects Off`;
  }
}

// ── DOWNLOAD PNG ─────────────────────────────────────────────────────────────
function downloadPNG() {
  // Wait for map to finish rendering, then grab canvas
  map.once('render', () => {
    const canvas = map.getCanvas();
    const dataURL = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataURL;
    a.download = `raipur-coverage-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Flash feedback
    const flash = document.getElementById('dl-flash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 2000);
  });
  map.triggerRepaint();
}

// ── FILTER ───────────────────────────────────────────────────────────────────
function filterTo(status) {
  zones.forEach(z => {
    const vis = (status==='all'||z.status===status) ? 'visible' : 'none';
    [`area-${z.id}`,`border-${z.id}`,`bldg-${z.id}`,`bldg3d-${z.id}`,`roads-${z.id}`].forEach(id => {
      if (map.getLayer(id)) map.setLayoutProperty(id,'visibility',vis);
    });
  });
}
</script>
</body>
</html>
