<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raipur — Coverage Map</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --accent: #4fc3f7; --bg: #070910; --panel: rgba(7,9,16,0.94); --border: rgba(255,255,255,0.07); --text: #e2e8f0; --muted: rgba(226,232,240,0.4); }
body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; }
#sidebar { width: 300px; min-width: 300px; height: 100vh; background: var(--panel); border-right: 1px solid var(--border); backdrop-filter: blur(24px); display: flex; flex-direction: column; z-index: 20; overflow: hidden; }
.sidebar-header { padding: 22px 20px 18px; border-bottom: 1px solid var(--border); }
.city-name { font-weight: 800; font-size: 28px; letter-spacing: -1px; color: #fff; line-height: 1; }
.city-name span { color: var(--accent); }
.city-tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--accent); opacity: 0.65; text-transform: uppercase; margin-top: 5px; }
.section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.section-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 11px; }
.scheme-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
.scheme-btn { height: 44px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; background: transparent; font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase; border-radius: 3px; }
.scheme-preview { width: 26px; height: 7px; border-radius: 2px; }
.scheme-btn.active { border-color: var(--accent); background: rgba(79,195,247,0.08); color: var(--accent); }
.scheme-btn:hover { border-color: rgba(79,195,247,0.35); }
.color-row { display: flex; gap: 10px; margin-top: 10px; }
.color-pick { display: flex; align-items: center; gap: 7px; flex: 1; }
.color-pick label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
input[type="color"] { width: 34px; height: 26px; border: 1px solid var(--border); background: transparent; cursor: pointer; border-radius: 3px; padding: 2px; }
.slider-row { margin-top: 10px; }
.slider-row .row-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 6px; }
.slider-row .row-label span { color: var(--accent); }
input[type="range"] { width: 100%; height: 3px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.zones-header { padding: 12px 20px 8px; border-bottom: 1px solid var(--border); }
.zones-list { flex: 1; overflow-y: auto; }
.zones-list::-webkit-scrollbar { width: 3px; }
.zones-list::-webkit-scrollbar-thumb { background: var(--border); }
.zone-item { padding: 9px 20px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.zone-item:hover { background: rgba(255,255,255,0.02); }
.zone-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.zone-name { font-size: 12px; font-weight: 600; }
.zone-badge { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 2px; }
.stats-bar { padding: 12px 20px; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; background: rgba(0,0,0,0.3); flex-shrink: 0; }
.stat-item { text-align: center; }
.stat-val { font-weight: 800; font-size: 15px; color: #fff; }
.stat-lbl { font-family: 'Space Mono', monospace; font-size: 7.5px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
#map { flex: 1; height: 100vh; position: relative; }
.map-controls { position: absolute; top: 18px; right: 18px; display: flex; gap: 7px; z-index: 10; }
.map-toggle { background: rgba(7,9,16,0.88); border: 1px solid rgba(255,255,255,0.1); color: rgba(226,232,240,0.5); font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; padding: 8px 13px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(12px); }
.map-toggle.on { border-color: var(--accent); color: var(--accent); background: rgba(79,195,247,0.08); }
.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
.mapboxgl-popup-content { background: transparent !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
#loader { position: fixed; inset: 0; background: #070910; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 18px; transition: opacity 0.5s; }
#loader.hidden { opacity: 0; pointer-events: none; }
.loader-title { font-weight: 800; font-size: 32px; letter-spacing: -1px; color: #fff; }
.loader-title span { color: var(--accent); }
.loader-bar { width: 180px; height: 2px; background: rgba(79,195,247,0.15); border-radius: 1px; overflow: hidden; }
.loader-bar::after { content:''; display:block; height:100%; background:var(--accent); animation: load 1.2s ease-in-out infinite; }
@keyframes load { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
.loader-sub { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; color:rgba(79,195,247,0.5); text-transform:uppercase; }
</style>
</head>
<body>
<div id="loader"><div class="loader-title">Rai<span>pur</span></div><div class="loader-bar"></div><div class="loader-sub">Loading map data...</div></div>
<div id="sidebar">
  <div class="sidebar-header"><div class="city-name">Rai<span>pur</span></div><div class="city-tag">Coverage Map · Chhattisgarh</div></div>
  <div class="section">
    <div class="section-label">Color Scheme</div>
    <div class="scheme-grid">
      <div class="scheme-btn active" onclick="setScheme('heat')" id="s-heat"><div class="scheme-preview" style="background:linear-gradient(90deg,#1a237e,#00bcd4,#4caf50,#ffeb3b,#f44336)"></div>Heat</div>
      <div class="scheme-btn" onclick="setScheme('cool')" id="s-cool"><div class="scheme-preview" style="background:linear-gradient(90deg,#0d1b2a,#1565c0,#42a5f5,#b3e5fc)"></div>Cool</div>
      <div class="scheme-btn" onclick="setScheme('neon')" id="s-neon"><div class="scheme-preview" style="background:linear-gradient(90deg,#0a0a0a,#004400,#39ff14)"></div>Neon</div>
      <div class="scheme-btn" onclick="setScheme('ember')" id="s-ember"><div class="scheme-preview" style="background:linear-gradient(90deg,#1a0a00,#bf360c,#ffd54f)"></div>Ember</div>
      <div class="scheme-btn" onclick="setScheme('solid')" id="s-solid"><div class="scheme-preview" id="solid-preview" style="background:linear-gradient(90deg,#111,#4fc3f7)"></div>Solid</div>
    </div>
    <div class="color-row">
      <div class="color-pick"><label>Color</label><input type="color" id="base-color" value="#4fc3f7" oninput="updateCustomColor()"></div>
      <div class="color-pick"><label>Peak</label><input type="color" id="high-color" value="#ffffff" oninput="updateCustomColor()"></div>
    </div>
    <div class="slider-row">
      <div class="row-label">Max Opacity <span id="opacity-val">75%</span></div>
      <input type="range" min="10" max="100" step="5" value="75" oninput="updateOpacity(this.value)">
    </div>
  </div>
  <div class="zones-header"><div class="section-label" style="margin:0;">Coverage Zones</div></div>
  <div class="zones-list" id="zones-list"></div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="s-avg">—</div><div class="stat-lbl">Avg Cover</div></div>
    <div class="stat-item"><div class="stat-val" id="s-zones">12</div><div class="stat-lbl">Zones</div></div>
    <div class="stat-item"><div class="stat-val" id="s-area">—</div><div class="stat-lbl">km² covered</div></div>
  </div>
</div>
<div id="map">
  <div class="map-controls">
    <button class="map-toggle on" id="t-coverage" onclick="toggleLayer('coverage')">Coverage</button>
    <button class="map-toggle on" id="t-3d" onclick="toggleLayer('3d')">3D Bldgs</button>
    <button class="map-toggle on" id="t-labels" onclick="toggleLayer('labels')">Labels</button>
  </div>
</div>
<script>
// Token from URL param ?t=YOUR_TOKEN or localStorage
const urlToken = new URLSearchParams(window.location.search).get('t');
if (urlToken) localStorage.setItem('mbtoken', urlToken);
const TOKEN = localStorage.getItem('mbtoken') || '';

const zones = [
  {id:'old-city',name:'Old City',area:18,coverage:85,coords:[[[81.625,21.225],[81.645,21.225],[81.645,21.245],[81.625,21.245],[81.625,21.225]]]},
  {id:'civil-lines',name:'Civil Lines',area:14,coverage:72,coords:[[[81.620,21.247],[81.640,21.247],[81.640,21.265],[81.620,21.265],[81.620,21.247]]]},
  {id:'shankar-nagar',name:'Shankar Nagar',area:12,coverage:60,coords:[[[81.608,21.260],[81.628,21.260],[81.628,21.278],[81.608,21.278],[81.608,21.260]]]},
  {id:'telibandha',name:'Telibandha',area:16,coverage:90,coords:[[[81.608,21.237],[81.628,21.237],[81.628,21.255],[81.608,21.255],[81.608,21.237]]]},
  {id:'tatibandh',name:'Tatibandh',area:15,coverage:45,coords:[[[81.605,21.225],[81.625,21.225],[81.625,21.243],[81.605,21.243],[81.605,21.225]]]},
  {id:'pandri',name:'Pandri',area:13,coverage:78,coords:[[[81.642,21.232],[81.662,21.232],[81.662,21.250],[81.642,21.250],[81.642,21.232]]]},
  {id:'avanti-vihar',name:'Avanti Vihar',area:11,coverage:55,coords:[[[81.648,21.248],[81.668,21.248],[81.668,21.266],[81.648,21.266],[81.648,21.248]]]},
  {id:'mowa',name:'Mowa',area:17,coverage:30,coords:[[[81.628,21.268],[81.648,21.268],[81.648,21.286],[81.628,21.286],[81.628,21.268]]]},
  {id:'fafadih',name:'Fafadih',area:14,coverage:65,coords:[[[81.640,21.258],[81.660,21.258],[81.660,21.276],[81.640,21.276],[81.640,21.258]]]},
  {id:'tikrapara',name:'Tikrapara',area:12,coverage:40,coords:[[[81.638,21.218],[81.658,21.218],[81.658,21.236],[81.638,21.236],[81.638,21.218]]]},
  {id:'pachpedi',name:'Pachpedi Naka',area:10,coverage:70,coords:[[[81.618,21.218],[81.638,21.218],[81.638,21.236],[81.618,21.236],[81.618,21.218]]]},
  {id:'khamtarai',name:'Khamtarai',area:11,coverage:20,coords:[[[81.660,21.243],[81.680,21.243],[81.680,21.261],[81.660,21.261],[81.660,21.243]]]},
];
let currentScheme='heat', maxOpacity=0.75, layerStates={coverage:true,'3d':true,labels:true};
const schemeStops={heat:[{v:0,r:26,g:35,b:126},{v:.3,r:0,g:188,b:212},{v:.6,r:76,g:175,b:80},{v:.8,r:255,g:235,b:59},{v:1,r:244,g:67,b:54}],cool:[{v:0,r:13,g:27,b:42},{v:.4,r:21,g:101,b:192},{v:.7,r:66,g:165,b:245},{v:1,r:179,g:229,b:252}],neon:[{v:0,r:5,g:10,b:5},{v:.25,r:0,g:80,b:0},{v:1,r:57,g:255,b:20}],ember:[{v:0,r:26,g:10,b:0},{v:.4,r:191,g:54,b:12},{v:.7,r:255,g:111,b:0},{v:1,r:255,g:213,b:79}]};
function lerpColor(val,stops){const v=Math.max(0,Math.min(1,val/100));let lo=stops[0],hi=stops[stops.length-1];for(let i=0;i<stops.length-1;i++){if(v>=stops[i].v&&v<=stops[i+1].v){lo=stops[i];hi=stops[i+1];break;}}const t=hi.v===lo.v?0:(v-lo.v)/(hi.v-lo.v);return`rgb(${Math.round(lo.r+(hi.r-lo.r)*t)},${Math.round(lo.g+(hi.g-lo.g)*t)},${Math.round(lo.b+(hi.b-lo.b)*t)})`;}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function getZoneColor(z){if(currentScheme==='solid'){const b=hexToRgb(document.getElementById('base-color').value),h=hexToRgb(document.getElementById('high-color').value),t=z.coverage/100;return`rgb(${Math.round(b.r+(h.r-b.r)*t)},${Math.round(b.g+(h.g-b.g)*t)},${Math.round(b.b+(h.b-b.b)*t)})`;}return lerpColor(z.coverage,schemeStops[currentScheme]);}
function getZoneOpacity(z){return .25+(z.coverage/100)*(maxOpacity-.25);}
mapboxgl.accessToken=TOKEN;
const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[81.635,21.252],zoom:12.2,pitch:45,bearing:-12,antialias:true});
const popup=new mapboxgl.Popup({closeButton:false,closeOnClick:false});
map.on('load',()=>{
  setTimeout(()=>document.getElementById('loader').classList.add('hidden'),400);
  map.addLayer({id:'buildings-3d',source:'composite','source-layer':'building',filter:['==','extrude','true'],type:'fill-extrusion',minzoom:12,paint:{'fill-extrusion-color':'#141d2e','fill-extrusion-height':['get','height'],'fill-extrusion-base':['get','min_height'],'fill-extrusion-opacity':.85}});
  zones.forEach(z=>{
    map.addSource(z.id,{type:'geojson',data:{type:'Feature',properties:{},geometry:{type:'Polygon',coordinates:z.coords}}});
    map.addLayer({id:`fill-${z.id}`,type:'fill',source:z.id,paint:{'fill-color':getZoneColor(z),'fill-opacity':getZoneOpacity(z)}});
    map.addLayer({id:`line-${z.id}`,type:'line',source:z.id,paint:{'line-color':getZoneColor(z),'line-opacity':.6,'line-width':1.2}});
    map.on('mouseenter',`fill-${z.id}`,(e)=>{map.getCanvas().style.cursor='pointer';popup.setLngLat(e.lngLat).setHTML(`<div style="font-family:'Syne',sans-serif;background:rgba(7,9,16,0.96);border:1px solid rgba(79,195,247,0.25);padding:12px 16px;border-radius:4px;min-width:160px;"><div style="font-weight:800;font-size:14px;color:#fff;margin-bottom:6px;">${z.name}</div><div style="font-family:'Space Mono',monospace;font-size:10px;color:#4fc3f7;">Coverage: <b>${z.coverage}%</b></div><div style="font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;">~${z.area} km² total</div><div style="margin-top:8px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;"><div style="height:100%;width:${z.coverage}%;background:${getZoneColor(z)};border-radius:2px;"></div></div></div>`).addTo(map);});
    map.on('mouseleave',`fill-${z.id}`,()=>{map.getCanvas().style.cursor='';popup.remove();});
  });
  buildZonesList();updateStats();
});
function buildZonesList(){document.getElementById('zones-list').innerHTML=zones.map(z=>`<div class="zone-item"><div class="zone-top"><div class="zone-name">${z.name}</div><div class="zone-badge" id="badge-${z.id}" style="background:${getZoneColor(z)}20;color:${getZoneColor(z)};">${z.coverage}%</div></div><input type="range" class="zone-slider" min="0" max="100" value="${z.coverage}" oninput="updateZone('${z.id}',+this.value)"></div>`).join('');}
function updateZone(id,val){const z=zones.find(z=>z.id===id);z.coverage=val;const c=getZoneColor(z);const b=document.getElementById(`badge-${id}`);if(b){b.textContent=val+'%';b.style.background=c+'20';b.style.color=c;}if(map.getLayer(`fill-${id}`)){map.setPaintProperty(`fill-${id}`,'fill-color',c);map.setPaintProperty(`fill-${id}`,'fill-opacity',getZoneOpacity(z));map.setPaintProperty(`line-${id}`,'line-color',c);}updateStats();}
function setScheme(s){currentScheme=s;document.querySelectorAll('.scheme-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`s-${s}`).classList.add('active');refreshAll();}
function updateCustomColor(){document.getElementById('solid-preview').style.background=`linear-gradient(90deg,#111,${document.getElementById('base-color').value})`;refreshAll();}
function updateOpacity(v){maxOpacity=v/100;document.getElementById('opacity-val').textContent=v+'%';refreshAll();}
function refreshAll(){zones.forEach(z=>{const c=getZoneColor(z);const b=document.getElementById(`badge-${z.id}`);if(b){b.style.background=c+'20';b.style.color=c;}if(map.getLayer(`fill-${z.id}`)){map.setPaintProperty(`fill-${z.id}`,'fill-color',c);map.setPaintProperty(`fill-${z.id}`,'fill-opacity',getZoneOpacity(z));map.setPaintProperty(`line-${z.id}`,'line-color',c);}});}
function toggleLayer(l){layerStates[l]=!layerStates[l];document.getElementById(`t-${l}`).classList.toggle('on',layerStates[l]);const v=layerStates[l]?'visible':'none';if(l==='coverage')zones.forEach(z=>{if(map.getLayer(`fill-${z.id}`))map.setLayoutProperty(`fill-${z.id}`,'visibility',v);if(map.getLayer(`line-${z.id}`))map.setLayoutProperty(`line-${z.id}`,'visibility',v);});if(l==='3d'){if(map.getLayer('buildings-3d'))map.setLayoutProperty('buildings-3d','visibility',v);map.easeTo({pitch:layerStates['3d']?45:0,duration:600});}if(l==='labels'){['country-label','state-label','settlement-label','poi-label','road-label'].forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility',v);});}}
function updateStats(){const avg=Math.round(zones.reduce((s,z)=>s+z.coverage,0)/zones.length);const a=Math.round(zones.reduce((s,z)=>s+z.area*(z.coverage/100),0));document.getElementById('s-avg').textContent=avg+'%';document.getElementById('s-area').textContent=a;}
</script>
</body>
</html>
